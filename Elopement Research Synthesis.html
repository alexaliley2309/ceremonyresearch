<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elopement Research Synthesis</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-bg: rgba(242,242,247,0.92);
  --sidebar-text: #3c3c43;
  --sidebar-hover: rgba(0,0,0,0.05);
  --sidebar-border: rgba(0,0,0,0.09);
  --main-bg: #f5f5f7;
  --card-bg: #ffffff;
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-muted: #aeaeb2;
  --border: rgba(0,0,0,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --accent: #007aff;
  --accent-bg: rgba(0,122,255,0.08);
  --accent-border: rgba(0,122,255,0.2);
  --rose: #b8697c;
  --rose-bg: rgba(184,105,124,0.09);
  --rose-border: rgba(184,105,124,0.22);
  --amber: #c9854e;
  --amber-bg: rgba(201,133,78,0.09);
  --sage: #6a9479;
  --sage-bg: rgba(106,148,121,0.09);
  --slate: #5a7fa0;
  --slate-bg: rgba(90,127,160,0.09);
  --terra: #b86b51;
  --terra-bg: rgba(184,107,81,0.09);
  --plum: #7a6db0;
  --plum-bg: rgba(122,109,176,0.09);
  --sand: #a8845c;
  --sand-bg: rgba(168,132,92,0.09);
  --sidebar-w: 260px;
  --topbar-h: 52px;
  --font-display: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
}

html, body { height: 100%; font-family: var(--font-body); background: var(--main-bg); color: var(--text-primary); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

.layout { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid rgba(0,0,0,0.08);
}

.sidebar-header {
  padding: 26px 22px 20px;
  border-bottom: 1px solid var(--sidebar-border);
}

.sidebar-eyebrow {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 7px;
  font-weight: 600;
}

.sidebar-project-name {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--text-primary);
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.sidebar-project-sub {
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}

.sidebar-nav { padding: 14px 0; flex: 1; }

.nav-label {
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 14px 14px 6px;
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  margin: 1px 8px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 13px;
  font-weight: 400;
  transition: all 0.12s ease;
  border-left: none;
  border-radius: 8px;
  user-select: none;
}
.nav-item:hover { background: var(--sidebar-hover); }
.nav-item.active { color: var(--accent); background: var(--accent-bg); font-weight: 500; }

.nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.nav-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }
.nav-item.active .nav-icon { opacity: 1; }

.sidebar-footer {
  padding: 14px 18px 18px;
  border-top: 1px solid var(--sidebar-border);
}
.sidebar-stat { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.sidebar-stat strong { color: var(--text-secondary); font-weight: 500; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: var(--topbar-h);
  background: rgba(245,245,247,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 14px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  letter-spacing: -0.01em;
}
.topbar-title .crumb { color: var(--text-muted); font-weight: 400; font-style: normal; cursor: pointer; }
.topbar-title .crumb:hover { color: var(--accent); }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-border);
}

.topbar-date { font-size: 11.5px; color: var(--text-muted); }

.content { flex: 1; overflow-y: auto; padding: 28px 30px; }

/* ── Cards & Grid ── */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }

.stat-card {
  background: var(--card-bg);
  border: none;
  border-radius: 14px;
  padding: 18px 22px;
  box-shadow: var(--shadow-sm);
}
.stat-label { font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; font-weight: 600; }
.stat-value { font-family: var(--font-display); font-size: 40px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 3px; letter-spacing: -0.02em; }
.stat-sub { font-size: 12px; color: var(--text-secondary); }

.section-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.section-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.015em; }
.section-count { font-size: 12px; color: var(--text-muted); }

/* ── Pattern cards ── */
.patterns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 28px; }

.pattern-card {
  background: var(--card-bg);
  border: none;
  border-radius: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.16s ease;
  box-shadow: var(--shadow-sm);
}
.pattern-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.pattern-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

.area-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 100px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: 1px solid transparent;
}

.tag-count { margin-left: auto; font-size: 10.5px; color: var(--text-muted); flex-shrink: 0; }

.pattern-insights { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.pattern-insights li {
  font-size: 12px;
  color: var(--text-secondary);
  padding-left: 13px;
  position: relative;
  line-height: 1.5;
}
.pattern-insights li::before { content: '—'; position: absolute; left: 0; color: var(--text-muted); font-size: 10px; }

/* ── Quotes ── */
.quotes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

.quote-card {
  background: var(--card-bg);
  border: none;
  border-left: 3px solid;
  border-radius: 0 14px 14px 0;
  padding: 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.quote-bigmark {
  font-family: var(--font-display);
  font-size: 60px;
  line-height: 1;
  position: absolute;
  top: 8px;
  right: 14px;
  opacity: 0.05;
  color: var(--text-primary);
  pointer-events: none;
}
.quote-text {
  font-family: var(--font-body);
  font-size: 14px;
  font-style: italic;
  line-height: 1.65;
  color: var(--text-primary);
  margin-bottom: 10px;
  font-weight: 400;
}
.quote-meta { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--text-muted); flex-wrap: wrap; }
.quote-author { font-weight: 600; color: var(--text-secondary); }

/* ── Participant cards ── */
.participants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

.p-card {
  background: var(--card-bg);
  border: none;
  border-top: 3px solid;
  border-radius: 14px;
  padding: 22px;
  cursor: pointer;
  transition: all 0.16s ease;
  box-shadow: var(--shadow-sm);
}
.p-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

.p-card-id { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
.p-card-name { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 11px; letter-spacing: -0.01em; }

.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.chip { display: inline-block; padding: 2px 9px; border-radius: 100px; font-size: 11px; font-weight: 500; background: rgba(0,0,0,0.05); color: var(--text-secondary); }

.detail-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; font-size: 12px; }
.detail-row .lbl { color: var(--text-muted); font-size: 10.5px; min-width: 78px; flex-shrink: 0; padding-top: 1px; font-weight: 600; letter-spacing: 0.03em; }
.detail-row .val { color: var(--text-secondary); line-height: 1.4; }

.p-card-more { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--accent); margin-top: 11px; font-weight: 400; }

.p-card-empty {
  background: transparent;
  border: 1.5px dashed rgba(0,0,0,0.12);
  border-radius: 14px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 190px;
  cursor: default;
}

/* ── Profile detail ── */
.profile-header {
  background: var(--card-bg);
  border: none;
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.profile-header-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), rgba(0,122,255,0.4));
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  margin-bottom: 18px;
  transition: opacity 0.12s;
  user-select: none;
  font-weight: 400;
}
.back-btn:hover { opacity: 0.7; }

.profile-title-row { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 18px;
  color: white;
  font-weight: 600;
  flex-shrink: 0;
}

.profile-pid { font-size: 11px; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
.profile-name { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; line-height: 1.15; letter-spacing: -0.02em; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 11px;
  border-radius: 100px;
  font-size: 12px;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-border);
  font-weight: 500;
}

.profile-details-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.profile-detail-box { background: var(--main-bg); border-radius: 10px; padding: 11px 14px; }
.profile-detail-box .lbl { font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.profile-detail-box .val { font-size: 12.5px; color: var(--text-primary); font-weight: 500; line-height: 1.4; }

.location-options-bar {
  background: var(--card-bg);
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.location-options-bar .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
.location-opts { display: flex; gap: 9px; flex-wrap: wrap; }
.location-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 13px;
  background: var(--main-bg);
  border-radius: 10px;
  font-size: 12.5px;
  color: var(--text-secondary);
}
.opt-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 1px solid rgba(0,0,0,0.07); margin-bottom: 20px; }
.tab { padding: 9px 16px; font-size: 13px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.14s; font-weight: 500; user-select: none; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Transcript ── */
.transcript-box {
  background: var(--card-bg);
  border: none;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.transcript-toolbar {
  padding: 12px 18px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: rgba(245,245,247,0.7);
}
.transcript-toolbar .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; flex-shrink: 0; }
.filter-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.fchip {
  padding: 2px 9px;
  border-radius: 100px;
  font-size: 10.5px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.14s;
  font-weight: 600;
  user-select: none;
}
.transcript-scroll { padding: 20px; max-height: 580px; overflow-y: auto; }
.t-entry { display: flex; gap: 14px; padding: 3px 7px; border-radius: 5px; transition: background 0.12s; }
.t-entry:hover { background: rgba(0,0,0,0.02); }
.t-time { font-size: 10.5px; color: var(--text-muted); min-width: 38px; padding-top: 3px; font-family: var(--font-body); flex-shrink: 0; letter-spacing: 0.01em; }
.t-text { font-family: var(--font-body); font-size: 14px; color: var(--text-primary); line-height: 1.7; flex: 1; }
mark.hl { border-radius: 3px; padding: 1px 2px; font-style: normal; }

/* ── Insights sections ── */
.insights-stack { display: flex; flex-direction: column; gap: 16px; }
.insight-box {
  background: var(--card-bg);
  border: none;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.insight-box-head {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 9px;
  border-bottom: 1px solid var(--border);
}
.insight-box-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
.insight-box-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 9px; }
.ipoint { display: flex; gap: 10px; padding: 10px 14px; background: var(--main-bg); border-radius: 7px; }
.ipoint-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
.iquote {
  border-left: 3px solid;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 13.5px;
  font-style: italic;
  color: var(--text-secondary);
  line-height: 1.65;
}
.iquote-credit { margin-top: 5px; font-size: 11px; font-style: normal; color: var(--text-muted); font-family: var(--font-body); }

/* ── Synthesis ── */
.synth-intro { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; max-width: 600px; line-height: 1.75; }
.synth-area {
  background: var(--card-bg);
  border: none;
  border-radius: 14px;
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.synth-area-head {
  padding: 16px 22px;
  display: flex;
  align-items: center;
  gap: 11px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.synth-area-head:hover { background: rgba(0,0,0,0.015); }
.synth-area-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; flex: 1; letter-spacing: -0.01em; }
.synth-area-meta { font-size: 11px; color: var(--text-muted); margin-right: 6px; }
.synth-area-body { padding: 22px; }
.synth-narrative { font-size: 13px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 18px; max-width: 660px; }
.synth-insights-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 9px; font-weight: 600; }
.synth-insights { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.synth-insight-item {
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 7px;
  border-left: 3px solid;
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.synth-quotes { display: flex; flex-direction: column; gap: 9px; }
.synth-section-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 9px; font-weight: 600; margin-top: 16px; }
.synth-tension-item {
  display: flex;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 7px;
  border-left: 3px solid #c9963a;
  background: rgba(201,150,58,0.07);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  font-style: italic;
}
.synth-opp-item {
  display: flex;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 7px;
  border-left: 3px solid;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  line-height: 1.6;
}
.synth-tensions { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.synth-opps { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.opp-need { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; opacity: 0.7; margin-bottom: 2px; }

/* ── Area detail ── */
.area-hero {
  border-radius: 14px;
  padding: 24px 28px;
  margin-bottom: 22px;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid;
  border-top: 1px solid rgba(0,0,0,0.04);
  border-right: 1px solid rgba(0,0,0,0.04);
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.area-hero-name { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; letter-spacing: -0.015em; }
.area-hero-narrative { font-size: 13px; color: var(--text-secondary); line-height: 1.8; max-width: 660px; }

.insights-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 26px; }
.insight-item-num {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 14px 16px;
  background: var(--card-bg);
  border: none;
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
}
.num-badge {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid transparent;
}

.all-quotes { display: flex; flex-direction: column; gap: 11px; margin-bottom: 26px; }
.full-quote {
  background: var(--card-bg);
  border: none;
  border-left: 3px solid;
  border-radius: 0 14px 14px 0;
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.full-quote-text { font-family: var(--font-body); font-size: 14px; font-style: italic; color: var(--text-primary); line-height: 1.65; margin-bottom: 10px; }

<script>

const AREAS = [
  {
    id: 'cultural',
    label: 'Cultural & Religious Identity',
    color: '#c9854e',
    bg: 'rgba(201,133,78,0.1)',
    border: 'rgba(201,133,78,0.28)',
    keywords: ['religious','cultural','Muslim','Islam','nikah','prayer','conservative','tradition','subcontinental','Indian','mosque','vows','witness'],
    narrative: 'Four participants (P02, P03, P05, P06) have no cultural or religious affiliation; P01 (Abdul) navigates significant inherited expectations — landing on the nikah as a minimum meaningful anchor. P05 (Teneille) adds a new dimension: while personally non-religious, she faces external family pressure for a church wedding, a tension others did not experience. She also introduces equality as a ceremony design concern: "not Mr. and Mrs. but Dr. and Dr." P06 (Lauren) separates legal and symbolic dimensions entirely, holding the ceremony in Indonesia without legal standing. A pattern across non-affiliated participants: full design freedom comes with full design responsibility — no template to follow or deviate from.',
    insights: [
      'Participants who carry cultural or religious heritage — even when no longer actively observant — still anchor their ceremony in a minimum meaningful ritual, because cultural identity persists beneath practice; this matters because ceremony must honour who someone has been, not only who they are now.',
      'Participants without cultural or religious affiliation describe feeling both liberated and exposed by design freedom — because there is no template to accept or reject, every choice must be entirely self-generated, which can surface creative paralysis alongside creative possibility.',
      'P05 (Teneille) experiences active family pressure for a church wedding that conflicts with her own values, and rejects it clearly — because the ceremony must feel authentic to the couple, not satisfying to outside observers; this reveals a hidden friction that venue variety alone cannot resolve.',
      'P06 (Lauren) deliberately separated legal registration from symbolic ceremony — holding a meaningful but non-legally-binding event in Indonesia and registering separately in Australia — because she prioritised relational and aesthetic experience over legal formality; this reveals that legal and meaningful marriage are increasingly decoupled in practice.',
      'P05 (Teneille) introduces equality as a ceremony design criterion — "not Mr. and Mrs. but Dr. and Dr." — revealing that for some couples, the ceremony\'s language and framing is a values statement about who they are to each other, not just a ritual structure.',
    ],
    tensions: [
      'Only one participant (P01/Abdul) navigates active cultural and religious expectations from a non-Western background — how other communities (South Asian Christian, Greek Orthodox, Jewish, Indigenous Australian) navigate the tension between inheritance and personal values remains unexplored in this cohort.',
      'It is unclear whether the "design freedom" experienced by non-affiliated participants feels liberating or burdensome during active planning; this dimension was surfaced briefly but not explored in depth with participants.',
      'P05\'s equality framing ("not Mr. and Mrs. but Dr. and Dr.") was unique in this cohort — we cannot yet determine whether this reflects a generational shift in how couples relate to ceremony language, or is specific to her professional and personal context.',
      'Secular Anglo-Australian couples face a compounded design challenge: not only must they build ceremony vocabulary from scratch (no inherited religious template), but they often do not know what ceremony options exist beyond the conventional format; the debrief surfaced that this cohort is particularly exposed to the "you don\'t know what you don\'t know" problem — exposure to ceremony practices from other cultures, approached thoughtfully rather than appropriatively, could meaningfully expand what feels possible for these couples.',
    ],
    opportunities: [
      { need: 'To honour cultural identity without performing a tradition that feels hollow or inherited', opportunity: 'A ritual design conversation or framework that helps couples distinguish which ancestral practices carry genuine personal resonance from those driven by obligation or expectation — surfacing "minimum meaningful" anchors, not a full cultural programme.' },
      { need: 'For non-affiliated couples to have structured starting points when building ceremony from scratch', opportunity: 'A curated ceremony element library that is not culturally-coded but is meaningfully organised by relational values, emotional intent, and what each element is designed to do — giving couples vocabulary and scaffolding without prescribing a tradition.' },
      { need: 'To discover what ceremony can look and feel like — beyond the conventional template they have already rejected', opportunity: 'A ritual inspiration resource — physical or digital — that introduces couples to meaningful ceremony practices from cultures around the world (sand ceremonies, flower symbolism, elder and children roles, spoken commitments, communal rituals), framed not as cultural borrowing but as expanding the vocabulary of what ceremony can do; giving non-religious couples permission and scaffolding to build something that genuinely reflects who they are.' },
    ]
  },
  {
    id: 'family',
    label: 'Family Dynamics & Expectations',
    color: '#b8697c',
    bg: 'rgba(184,105,124,0.1)',
    border: 'rgba(184,105,124,0.28)',
    keywords: ['family','parents','siblings','expectation','involved','back home','families','mom','dad','obligation','heritage','filial','hospitality'],
    narrative: 'Five distinct orientations to family emerge. P01 (Abdul) navigates heavy expectation from extended family in India, using self-funding to maintain control while curating bounded participation roles. P02 (Greg) protects by exclusion — total secrecy to avoid imposing on anyone. P03 (Lynelle) negotiates a minimum meaningful circle through loving iteration. P06 (Lauren) frames the wedding as a gift to guests — hosting-as-service, asking nothing in return. P05 (Teneille) introduces a delegation model: parents who want a big traditional wedding are channelled toward planning and funding the dinner celebration — genuine inclusion in something they care about, without controlling the ceremony itself. All five: genuine care for others, radically different expressions.',
    insights: [
      'Couples who anticipate strong family opinions about their wedding — across every demographic in this cohort — structure their autonomy deliberately before planning begins, because without a clear strategy, family expectations can colonise the planning process; this matters because the relationship between couple and family must be actively managed, not assumed to be naturally supportive.',
      'Participants who self-fund their wedding consistently describe financial independence as the mechanism for decision-making control — not merely cost savings — because accepting family money is understood to carry an implicit obligation of input; this reveals that financial planning and autonomy planning are the same conversation, and should be approached together.',
      'P05 (Teneille) introduces a productive delegation model: parents who want a large traditional wedding are channelled into planning and funding a separate dinner celebration, giving them genuine and meaningful involvement without granting them authority over the ceremony itself — because inclusion does not require shared decision-making power.',
      'P02 (Greg) chose total secrecy as a form of care — protecting others from schedule obligation and the pressure of attendance — revealing that for some couples, family wellbeing is best served by not including them at all; this is a paradoxically loving form of exclusion.',
      'P06 (Lauren) framed the wedding as an act of service to guests — hosting as a gift, not a performance — and gave over a year of advance notice to remove the burden of international travel planning; this reveals that the couple\'s generosity of spirit can itself become a ceremony value.',
      'The debrief — reinforced through early celebrancy training — surfaces that giving specific, purposeful roles to people within the ceremony circle (elders as holders of continuity, parents as symbols of shared history, children as representatives of the future) can deepen participation for those present and manage inclusion without expanding the guest list; this connects to P01\'s (Abdul\'s) approach of curating bounded roles, and suggests that "who is present" is less important than "what each person is invited to do and mean" within the ceremony itself.',
    ],
    tensions: [
      'The family dynamics represented are predominantly Anglo-Australian (P02, P03, P06) or from a single non-Western background (P01). How other cultural communities navigate the same tensions — where family authority over marriage decisions may be structurally different — is not yet visible in this cohort.',
      'Almost all participants describe post-ceremony family responses as positive or accepting — we have limited visibility into cases where family relationships were genuinely strained by the choice of scale or format; this may reflect sampling bias toward participants comfortable with their decisions.',
      'P05\'s delegation model is conceptually compelling but largely untested at time of interview — we do not yet know how parents respond when channelled toward the dinner rather than the ceremony, or whether that boundary holds under relational pressure.',
    ],
    opportunities: [
      { need: 'To include family in a meaningful way without ceding control of the ceremony', opportunity: 'A "meaningful roles" framework that helps couples offer families specific contribution tasks — hospitality coordination, gift exchange management, celebration extension planning — that carry genuine weight without touching ceremony design.' },
      { need: 'To have a difficult conversation with family about format and scale before planning begins', opportunity: 'Communication scaffolding — scripts, conversation starters, framing guides — that helps couples explain their choice in ways that lead with love and shared values rather than logistics and refusal.' },
    ]
  },
  {
    id: 'size',
    label: 'Ceremony Size & Intimacy',
    color: '#6a9479',
    bg: 'rgba(106,148,121,0.1)',
    border: 'rgba(106,148,121,0.28)',
    keywords: ['intimate','small','guests','people','everyone','meet','micro','elopement','size','intimate','close','witnesses','circle'],
    narrative: 'Every participant independently rejected scale as a marker of celebration quality. P02 (Greg) went to zero guests; P03 (Lynelle) to 7; P05 (Teneille) targets ~10; P06 (Lauren) to ~28 across a multi-day estate; P01 (Abdul) targets 17–80. The shared insight is not a preference for small numbers but a rejection of the rigid template. P05 introduces the two-part structure explicitly: intimate private ceremony for ~10 "cheerleaders," followed by a larger dinner celebration organised and funded by parents — enabling different audiences without compromising the ceremony itself. P06\'s multi-day estate achieves a similar split across time. Across all participants, traditional wedding guests are described as passive observers; every intimate format makes everyone an active participant.',
    insights: [
      'Every participant in this cohort, regardless of cultural background or relationship length, independently chose to reduce ceremony scale below conventional expectations — not because they could not afford more guests, but because they equated intimacy with quality of presence; this reveals that intimacy is not a budget compromise but a values-driven design decision with a distinct experiential theory behind it.',
      'Participants with direct experience of a large traditional wedding (P02, P03) are the most unequivocal in their rejection of scale — because they had a lived comparison point; this suggests that prior experience of large weddings is a more powerful driver of intimate-format preference than abstract values alone.',
      'P05 (Teneille) articulates the most explicit structural formula: approximately ten "cheerleaders" at the ceremony, followed by a larger dinner coordinated by parents — because different audiences serve different relational functions; this matters because it reveals that scale reduction does not require excluding people, it requires redesigning the event structure.',
      'P01 (Abdul) defines intimacy operationally and functionally: every guest must be able to meet every other guest — a measurable, generalisable heuristic for meaningful presence that could serve as a practical planning tool for any couple navigating guest list decisions.',
      'P06 (Lauren) solved the "blink-and-it\'s-gone" problem of one-day weddings by extending the temporal footprint of the event across multiple days — because intimacy is not only about who is present, but how much unstructured time people have to actually be with each other.',
    ],
    tensions: [
      'We hear only the couple\'s perspective on guest exclusion — we have no data on how excluded guests experience the choice, or how that changes family and friendship dynamics in the longer term.',
      'P01\'s target range of 17–80 guests is considerably wider than others in the cohort; his upper bound overlaps with what other participants would describe as a traditional wedding, suggesting the threshold of "intimate" is highly context-dependent and not a fixed number.',
      'Several participants describe retrospective uncertainty about the guest list — a tension that only resolves after the event. Planning tools cannot eliminate this; they can only help couples make a decision they can stand behind at the time.',
      'An early signal from the debrief suggests that "adventure elopement" — where a couple goes to an extreme or remote location (helicopter, mountaintop) with no or minimal guests — may represent a distinct archetype from the "intimate micro-gathering" modelled by most participants in this cohort; the latter is built around including 6–10 close supporters and requires logistics for a small group, while the former prioritises radical privacy and extreme experience; treating these as variations of the same product may miss a meaningful structural difference in what each archetype actually needs.',
    ],
    opportunities: [
      { need: 'To make a guest list that reflects genuine relational priorities without guilt', opportunity: 'A guest list framework that helps couples apply their own relational criteria — rather than social obligation defaults — to produce a list they can explain, stand behind, and revisit without regret.' },
      { need: 'To celebrate with a wider circle without compromising the ceremony itself', opportunity: 'A two-part event structure model — intimate ceremony plus a celebration extension — with distinct planning support for each, enabling couples to meet multiple relational obligations without conflating the audiences or diluting either experience.' },
    ]
  },
  {
    id: 'location',
    label: 'Location & Logistics',
    color: '#5a7fa0',
    bg: 'rgba(90,127,160,0.1)',
    border: 'rgba(90,127,160,0.28)',
    keywords: ['Australia','India','Melbourne','venue','location','destination','travel','fly','monsoon','season','Malaysia','Southeast Asia','resort','hill station','third country'],
    narrative: 'Location carries the most emotional weight of any logistical decision, and each participant reveals a distinct dimension. P01 (Abdul) uses location as a control lever. P02 (Greg) uses it as a simplicity lever. P03 (Lynelle) reveals revisitability: the location you can return to keeps giving meaning. P06 (Lauren) introduces community architecture — the estate model as a residential community for guests. P05 (Teneille) adds a privacy dimension: a private location is a core requirement linked to authenticity, and time poverty (both doctors) limits her research bandwidth. A consistent pattern: the best location is not the most beautiful or most convenient, but the one that enables the relational experience the couple actually wants.',
    insights: [
      'Participants who plan an intimate or non-traditional ceremony treat location as the primary design decision — not a backdrop, but the architecture that enables all other relational and logistical choices; this matters because it means couples need to resolve location before they can make meaningful decisions about almost anything else.',
      'P03 (Lynelle) discovered post-hoc that returning to their ceremony location was deeply and unexpectedly meaningful — a dimension of location value that was not visible at planning time and was not surfaced by anyone in the process; this suggests that revisitability is an underrated location criterion that most planning conversations never raise.',
      'P06 (Lauren) used an estate model to transform location into a residential community — guests waking together, sharing meals, spending extended unstructured time — because the "blink-and-it\'s-gone" problem of single-day weddings can be solved by extending the temporal footprint of the location choice itself.',
      'P05 (Teneille) identifies privacy as a non-negotiable location criterion — not seclusion for its own sake, but as a condition for full emotional presence; for couples in high-visibility professions, public or semi-public settings create psychological interference that a private setting removes.',
      'P01 (Abdul) uses location as an explicit control lever, mapping his three options against the degree of family influence each enables — revealing that location choice is not only an aesthetic or logistical decision, but a negotiation of power and autonomy within a relational system.',
    ],
    tensions: [
      'We have limited data on couples whose location choice is constrained by accessibility needs, visa or travel restrictions, or participant health — most of this cohort had high geographic mobility and financial flexibility; their experience may not generalise.',
      'P01 is the only participant actively considering a destination outside Australia for ceremony — the multi-country decision framework he describes is unique in the cohort, and we have no comparators to understand how common this orientation is.',
      'The gap between "discovered" locations (P03\'s Emily Bay, found through chance) and "designed" locations (P06\'s estate, selected through research) is significant — we don\'t yet understand how couples with no strong location inspiration navigate that decision when there is no obvious anchor.',
    ],
    opportunities: [
      { need: 'To find a location that enables the specific relational experience the couple wants to create', opportunity: 'A location discovery process that begins with "what do you want guests to feel and do?" before surfacing venue options — prioritising the relational and temporal experience the couple wants to create, rather than beginning with aesthetics or availability.' },
      { need: 'To evaluate locations against dimensions of value that are not visible at planning time', opportunity: 'A location evaluation framework that includes revisitability, guest logistical burden, symbolic resonance, and long-term meaning — not only aesthetics, cost, and availability — giving couples a richer basis for a decision they will live with for decades.' },
    ]
  },
  {
    id: 'budget',
    label: 'Budget & Financial Control',
    color: '#b86b51',
    bg: 'rgba(184,107,81,0.1)',
    border: 'rgba(184,107,81,0.28)',
    keywords: ['cost','money','budget','fund','expense','pay','afford','financial','spend','expensive','income','price'],
    narrative: 'Budget philosophy differs across participants but a shared principle emerges: spend concentrates where experience concentrates. P01 self-funds to preserve autonomy; P02 minimises as a values statement; P03 uses scale reduction to enable quality elevation. P06 adds international cost arbitrage — Indonesia at a fraction of equivalent Australian cost. P05 (Teneille) introduces the clearest philosophical framing: "the commitment of ceremony is more important than the show of it all." Her relationship is "celebrated every day" — ceremony adds form to existing meaning, not meaning itself. Her delegation model also enables a cost-free celebration extension: parents fund the dinner. None of these couples spent less because they wanted a cheaper wedding; they spent differently to get more of what they actually valued.',
    insights: [
      'Couples who have strong views about ceremony format — whether intimate, non-traditional, or destination — frame budget choices in terms of the autonomy those choices protect, not in terms of cost minimisation; this matters because budget conversations in this context are rarely about money alone — they are about who gets to decide.',
      'P03 (Lynelle) articulates a quality-over-scale philosophy that reframes budgeting entirely — reducing guest count unlocks per-person quality that would be impossible at scale; this challenges the assumption that intimacy is a budget compromise, showing instead that scale reduction can be a quality premium strategy.',
      'P05 (Teneille) provides the clearest philosophical anchor in the cohort: "the commitment of ceremony is more important than the show of it all" — because the ceremony\'s purpose is to mark and give form to an existing commitment, not to impress observers; this frees couples from the conventional spend-to-status equation entirely.',
      'P06 (Lauren) demonstrates that international cost arbitrage can unlock quality-at-scale that is impossible domestically — her Indonesian ceremony delivered an experience estimated at over $100,000 in Australian equivalent terms, for a fraction of that cost; this reveals that geography is itself a budget lever, not only a logistics variable.',
    ],
    tensions: [
      'All participants in this cohort had sufficient income to self-fund a scaled-down wedding — we have no data on how couples with genuine financial constraints navigate these same decisions, or whether the values-led framing holds when options are structurally limited.',
      'The long-term financial narrative is largely absent from these conversations — we do not know how participants feel about their spend in retrospect, or whether any experienced financial stress in the lead-up that they did not surface in interview.',
      'P05\'s delegation model (parents fund and organise the dinner) resolves the couple\'s cost problem elegantly, but we do not yet know how it lands with parents in practice — or whether it creates a different kind of reciprocal obligation.',
    ],
    opportunities: [
      { need: 'To spend meaningfully rather than conventionally — allocating toward what actually matters', opportunity: 'A spend philosophy conversation early in planning that helps couples articulate what they are trying to buy (experience, autonomy, quality, intimacy) before any budget is set — surfacing the values behind the numbers and enabling allocation decisions that reflect those values.' },
      { need: 'To understand what "value" looks like in intimate ceremony contexts, where conventional benchmarks do not apply', opportunity: 'A budget guide specific to micro-weddings and elopements that surfaces the cost levers unique to this format — location geography, seasonal timing, bundled vs. unbundled services, two-part event structures — and helps couples compare options in terms of experience value, not only price.' },
    ]
  },
  {
    id: 'vendor',
    label: 'Vendor & Planning Support',
    color: '#7a6db0',
    bg: 'rgba(122,109,176,0.1)',
    border: 'rgba(122,109,176,0.28)',
    keywords: ['planner','vendor','celebrant','package','plan','hire','book','coordinator','help','organise','officiant','services'],
    narrative: 'Across all participants, the ideal vendor is self-effacing, collaborative, and values-aligned — not prescriptive. P03 (Lynelle) provides the clearest positive model: celebrant as trusted local hub. P06 (Lauren) provides the clearest endorsement of professional planning: "non-negotiable." P06 also draws the sharpest role distinction: Celebrant directs the couple during ceremony; Planner architects the full experience. P05 (Teneille) adds a new filter dimension: celebrant selection is values-based before personality-based — LGBTQ+ affirmation and equality orientation are minimum requirements. She also articulates the package gap most clearly: existing packages don\'t allow autonomy over what matters most (choosing the celebrant, guest count). The ideal model for P05 is bespoke-on-brief: describe what you want, have it built.',
    insights: [
      'Participants who used professional planning support describe it as transformative when the planner operated as a listener-curator — someone who surfaced options and coordinated logistics without imposing their own aesthetic or process preferences; this matters because the value of planning support is not expertise per se, but expertise deployed consistently in service of the couple\'s vision.',
      'The celebrant is described across multiple participants as the most personal, values-laden hire in the planning process — because the celebrant is the only vendor whose presence is intrinsic to the ceremony itself; this means values alignment, not just personality fit or price, is the correct primary selection criterion.',
      'P05 (Teneille) introduces a values-first celebrant filter that others in the cohort did not name explicitly: LGBTQ+ affirmation and equality orientation as minimum requirements, evaluated before personality or style; this matters because it reveals that for some couples, celebrant selection is a safety and dignity decision as much as an aesthetic one.',
      'P01 (Abdul) describes a specific gap in the Australian planning market: the absence of vendors who understand the detailed requirements of Islamic ceremony — halal, no alcohol, nikah structure, religious officiant — while also being able to navigate a multicultural Australian guest experience; cultural competence in vendor services is unevenly distributed.',
      'P06 (Lauren) draws the sharpest role distinction in the cohort: the Celebrant anchors the ceremony and guides the couple through it; the Planner architects the full experience and surfaces what the couple has not yet thought of — these are distinct competencies that should not be conflated in either selection or expectation.',
      'The debrief identified a clear gap in the current market: no vendor or planning platform appears to begin the intake conversation by asking couples what memory they want to walk away with, or what has felt meaningful to them in past celebrations; the dominant model is transactional — here are the services, here are the prices, you choose — rather than emotionally-led; this represents a genuine differentiator for a service that begins where couples actually are (uncertain about what they want) rather than assuming they already know.',
    ],
    tensions: [
      'We have limited data on negative vendor experiences beyond brief descriptions of "prescriptive" vendors — it is unclear how couples recover from a poor vendor match, or how much that risk shapes the emotional experience of planning overall.',
      'P05 had not engaged with vendors at the time of interview — her vendor preferences are projections from values rather than direct experience, and may or may not translate into what she actually needs during a live planning process.',
      'The gap between what couples say they want (listener-curators who build on their brief) and what most vendors likely offer (packaged, templated services) is significant — but we have no vendor-side data to understand why that gap exists or how difficult it would be to close.',
    ],
    opportunities: [
      { need: 'To find a celebrant who genuinely understands and can represent the couple\'s values, not just their aesthetic', opportunity: 'A celebrant matching service or directory organised by values dimensions — LGBTQ+ affirmation, cultural and religious competence, equality orientation, ceremony style — rather than geography or price alone; helping couples find someone whose worldview is a genuine match.' },
      { need: 'For a planning partner who will build the experience on the couple\'s brief, rather than requiring them to fit a template', opportunity: 'A bespoke-on-brief service model for elopements and micro-weddings that begins with a structured discovery conversation and builds a tailored package from what the couple describes — prioritising autonomy and fit over simplicity of delivery.' },
      { need: 'To be guided toward what they want emotionally before being asked to choose services and prices', opportunity: 'An emotionally-led intake process — structured reflection questions, a ritual inspiration resource, or a values-mapping conversation — that helps couples articulate what the ceremony is for, what memory it should create, and what has felt meaningful in their own experience; positioning the service as a thinking partner and co-designer before it becomes a logistics provider.' },
    ]
  },
  {
    id: 'meaning',
    label: 'Authenticity & Meaning-Making',
    color: '#a8845c',
    bg: 'rgba(168,132,92,0.1)',
    border: 'rgba(168,132,92,0.28)',
    keywords: ['authentic','meaningful','real','important','memories','cats','unique','love','personal','whimsical','significant','hollow','fake','sake'],
    narrative: 'Authenticity is the master value across all participants. P01 (Abdul) makes meaning additively — weaving in cats, heritage prayer, family as bridge. P02 (Greg) makes it subtractively — stripping until only the irreducible remains. P03 (Lynelle) reframes the event as communal experience — "celebrating all of our relationships." P06 (Lauren) adds active participation and shared creation — planning itself as meaningful. P05 (Teneille) introduces the most radical framing: "the commitment of ceremony is more important than the show of it all." Her relationship is "celebrated every day" — ceremony adds form to existing meaning, not meaning itself. Authenticity for her is expressed through "feeling like myself" rather than through curating ceremony elements.',
    insights: [
      'Every participant describes a primary ceremony design fear — performing a ceremony that feels hollow, "for show," or disconnected from who they actually are — and this fear is the most consistent cross-demographic pattern in the dataset; this matters because authenticity is not a preference or differentiator, it is a minimum viability criterion for intimate weddings.',
      'Participants construct meaning through radically different strategies that are not random but reflect each person\'s underlying theory of what a wedding is for: P01 additively (weaving in pets, prayer, cultural bridge), P02 subtractively (stripping away until only the irreducible remains), P03 communally (celebrating all relationships, not just the couple), P05 relationally (ceremony as form-giving to pre-existing commitment); this reveals that "authenticity" looks different for every couple and cannot be served by a single approach.',
      'P05 (Teneille) articulates the most radical reframing in the cohort: because the relationship is "celebrated every day," the ceremony\'s job is not to mark a new state but to formalise an existing one — a frame that fundamentally changes what success looks like, and frees the couple from performing transformation they have already lived.',
      'P06 (Lauren) finds meaning in the planning process itself — "nothing we didn\'t do together" — because co-authoring the event is itself an expression of the relationship; this reveals that for some couples, the experience of planning is inseparable from the meaning of the ceremony, and should be treated as part of the experience, not merely preparation for it.',
      'A consistent signal across the debrief: the more emotionally invested a couple is in a specific output — photographs, location, food and drink — the more willing they are to invest in producing it; conversely, elements that do not map to personal emotional values (elaborate florals, dress details) attract low or no investment from this cohort; this matters because budget and vendor conversations should begin with emotional value, not line-item costs, and couples who cannot yet articulate what they value emotionally will struggle to make any spending decision with confidence.',

    tensions: [
      'The authenticity standard is entirely self-referential — couples assess authenticity against their own values, not an external benchmark; this makes it very easy to misjudge in advance, and means that planning tools which offer external frameworks risk feeling prescriptive rather than supportive.',

      { need: 'To protect the authenticity of the ceremony under the pressure of logistics, family expectations, and vendor defaults', opportunity: 'An "authenticity anchor" exercise early in planning that articulates the two or three non-negotiable elements each partner would grieve if absent — used as an explicit decision filter throughout planning when compromises must be made.' },

      {time:"0:03",text:"Yeah, no worries at all."},

      {time:"0:06",text:"Have you done something like this before, this kind of interview, kind of user research experience?"},

      {time:"0:22",text:"So I'll give you a little introduction about what to expect, and you can ask me any questions, and then we'll kick off."},
      {time:"0:30",text:"So today we're going to be having a conversation about your upcoming wedding, your experience kind of planning for that ceremony."},

      {time:"1:31",text:"If there's ever a question that isn't comfortable for you to answer, just let me know and we can keep moving — because I know we're going to be talking about family and planning and some of the emotions around that."},

      {time:"2:19",text:"Nice to meet you, Hannah."},
      {time:"2:25",text:"Abdul, I know that you filled out that survey for us. But I did want to hear a bit more from you — can you tell me a bit about your path that you're on towards marriage?"},
      {time:"2:45",text:"I can see that you're engaged — congratulations. I was curious about finding out a little bit more about your relationship. Where did you meet, and when did you start discussing transitioning that relationship into marriage?"},
      {time:"2:53",text:"Oh, absolutely. So my partner and I are from India originally. We live in Melbourne, in Australia — we've been here about 8 years now, nearly, so it's been quite some time."},
      {time:"3:08",text:"We met originally in India, about 10 years ago. We were both sort of finishing off our higher educational studies — doing an undergraduate course. That's when we met."},
      {time:"3:22",text:"We started dating, and we decided to move to another country for our masters, for our postgrad studies. It ended up being Australia, and we ended up deciding to move together."},
      {time:"3:36",text:"So that was about 2018 that we moved to Australia, and we've been in a relationship since I think 2015 or so."},
      {time:"3:48",text:"More recently, over the last few years, we started having discussions around sort of more what our longer term plans were and what direction we were heading in."},
      {time:"4:05",text:"We felt a bit more settled. We started off with work and working full time, and we said, yeah, it sounds like a good time to start looking at those options."},
      {time:"4:32",text:"Coming from that cultural background, there is always a massive expectation from back home that the family is generally always involved in decisions of that sort, or in any sort of celebration — even more so than in Australia or any other Western countries."},
      {time:"4:57",text:"I don't know how familiar you are with subcontinental weddings and marriage ceremonies, but they can go on for days at times — made up of a number of different occasions and celebrations."},
      {time:"5:10",text:"When we started having those conversations, we thought we'd have to have a proper think about how we do this because we have family back home and then we live here. How would things work?"},
      {time:"5:38",text:"But we both knew that we would like to get married to each other. So essentially what ended up happening was, in my head I kind of had this idea about the timeframe and the flow of things."},
      {time:"6:10",text:"Last year in March is when I ended up proposing — to my then girlfriend — in Fiji. I planned a surprise trip for her, she had no idea what was happening, and we just flew out. The whole proposal was planned and that's how we got engaged essentially."},
      {time:"6:34",text:"We did that bit without our family — because even though we acknowledge how much they would like to be involved, we just felt like we wanted something private and something for ourselves, at least at that phase."},
      {time:"6:54",text:"Later in the year, what we ended up doing was heading back to India for about 2 weeks, where we essentially had another smallish ceremony with family — the more official engagement ceremony — so that they would feel involved and engaged and a part of it."},

      {time:"7:50",text:"In India it often ends up being altogether — the engagement is like day one, and then days 2, 3, 4, 5 are all the other ceremonies and they all come together as one big wedding package."},
      {time:"8:03",text:"Where we differ from things is that we've technically done the engagement but we are yet to do the proper wedding, the reception, and the stuff we want to do."},
      {time:"8:26",text:"We're both very cognisant of the fact that we don't want to do things the way most Indian weddings go — this massive event, inviting thousands of people, booking out a wedding hall. We wanted something a lot more smaller, a lot more intimate."},
      {time:"8:51",text:"We're thinking in that direction now — how to align with our own expectations and what we're comfortable with, but also what our families probably expect of us as well."},
      {time:"8:59",text:"We're in that phase where we've gotten engaged and we're planning things, but we haven't quite landed on exactly what we want to do — and more importantly, where. Our close friends are Australia-based and our family is in India."},
      {time:"11:23",text:"We thought it would be good to start listing out guests who we'd be comfortable inviting — as a base — because if we don't then we have no idea of the sort of... what we're doing."},
      {time:"11:38",text:"We were quite clear with each other that we wanted it to be very intimate, very immediate family only. But even that in India would be your own family unit — parents and siblings. My partner has about 4 siblings and their kids, which already becomes a few tens of people."},
      {time:"12:13",text:"And then there are close friends here — both of us are quite close to our coworkers who we work with, and we definitely want to invite them to wherever we're doing it."},
      {time:"12:47",text:"At that point we started looking at venues that would be possible. We're still not decided whether it's going to be in India, whether it's going to be in Australia, whether it's somewhere in between."},
      {time:"13:04",text:"We did a bit of basic research. We said we don't want to do things the way everyone does — we want something more intimate. So we started looking at a hill station or a resort around our city that we could take people to and spend like a weekend or 3 days."},
      {time:"13:54",text:"That's our way of creating great memories with the people we love — not having a wedding where nobody remembers what's happened. That's been our experience growing up attending other people's weddings in India."},
      {time:"14:17",text:"You could have invites to like two or three weddings in a week in India — and I don't remember any of those weddings with those people unless it was like a first cousin I knew beforehand anyway."},
      {time:"14:36",text:"We were very strongly wanting to avoid something of that sort — people attending for the sake of attending a wedding, where you don't know who you're shaking hands with or hugging because you've never really been introduced to them."},
      {time:"15:02",text:"So that was the first option — taking people away somewhere in India, having this closed bubble where we all know each other, families can get to know each other, and friends from Australia are coming so they can have a good time."},
      {time:"15:22",text:"The second option was obviously to have it here in Australia. We'd be looking to fly both families and some close friends from India — but then there's the question of logistically, who pays, how would that work?"},
      {time:"15:51",text:"And again, we've not progressed any of these options — we've not really thought any further or asked them whether they'd be comfortable."},
      {time:"16:05",text:"The third option was a third country other than Australia and India. We haven't identified what that might be, but it would be somewhere Indians can travel to without too much visa hassle, and a shorter flight for them and for us."},
      {time:"16:25",text:"Something like Malaysia — we can all fly there, we meet there, we do the ceremony, then everyone flies back to their original countries."},
      {time:"16:49",text:"In terms of logistics, we've progressed things a bit more with the India option — we went through and did a budget: catering, accommodation, decorations, hire of different things."},
      {time:"17:35",text:"There often isn't a celebrant or master of ceremony in the type of wedding we do from our part of India and our religious and cultural background. So we wouldn't need a celebrant in the traditional sense."},
      {time:"18:07",text:"With the Australian option, thinking about what catering would look like — with the added complication that we're both from a Muslim background. So the food needs to be halal. There is no alcohol at Muslim weddings. Does the venue accommodate that, or does that eliminate certain venues?"},
      {time:"19:10",text:"We've thought a little bit about what time of year would be ideal. If it's the Indian option, we know we should probably be avoiding the monsoon and the wetter part of the year. If we're doing something outdoors in Australia, we want to avoid peak summer because we both don't do too well with heat."},
      {time:"20:08",text:"One thing I heard from you — you used the phrase 'people who are happy to see us get married.' And if I think about that on a spectrum, because you mentioned some elements of traditional weddings which can be very large, where maybe not everyone attending has that level of intimacy with the couple..."},
      {time:"21:00",text:"We actually ran the numbers on this. I missed out one group — from my side of the family, my mom and dad's siblings. So that's my first cousins and my uncles and aunts. My parents are both very close to their siblings, more so than my partner's family."},
      {time:"21:34",text:"So that expanded things a little bit, and there's a bit of an imbalance — on my side there's one extra layer, but not on my partner's side. Her side would just be her parents and her siblings."},
      {time:"21:43",text:"The number we ended up calculating was 80 people — with a few buffers built in, like maybe 5 extra in case we're leaving someone off the list."},
      {time:"22:24",text:"I want to hone in on that number — in your survey you mentioned you were looking at a micro wedding (under 20 guests) and also indicated you might even think about an elopement. Given the range, where are you on that spectrum?"},
      {time:"22:56",text:"The 80-people one would only ever work if it was happening in India. We would definitely not be looking to fly these tens of people out — they probably couldn't afford it themselves, and we wouldn't be looking to spend that money."},
      {time:"23:24",text:"So both the other options — I think we're tending more toward one of those two than India. Because if we're doing it in India, there will be elements that are not in our control and it's just gonna end up spiraling and stuff."},
      {time:"23:46",text:"My family would be my parents and my brother — that's 3. And Amber's side would be her siblings, their kids, and her parents — about 13 people or so. Altogether about 17 guests and then the two of us."},
      {time:"24:21",text:"I'm pretty sure some of them might have work commitments and might drop off that list. And elopement obviously would be — I've seen a friend do this — essentially just them and witnesses, and that's the extent of it."},
      {time:"26:34",text:"One question I had — in terms of folks involved in funding different elements of the ceremony. For some folks, when family members are contributing, there might be less agency over some of those decisions. How is that playing out for you and your partner?"},
      {time:"26:53",text:"Absolutely. As before you asked that question I was sort of just thinking about the financial aspect — we both see it as something we're aligned on, that we kind of want to fund things ourselves."},
      {time:"27:02",text:"In India from the place we come from, there is always the element of families contributing to the wedding. Someone takes care of one aspect, the other side of the family takes care of another, so the financial burden on the couple is often reduced."},
      {time:"27:54",text:"We were quite cognisant that we would not like to accept too much help from family — or any help, if we could avoid it. Which then limits what you can do. But we're OK with that."},
      {time:"28:10",text:"We understand it might not be as big a wedding, or might not tick every single box we would have dreamed of. But if that's the trade-off to having control over things and making sure they go the way we wanted to, then we're OK with it."},
      {time:"29:00",text:"What needs to happen in order to make the ceremony feel meaningful for you, as you walk that line between the past and present — the way you grew up and the culture you're navigating now?"},
      {time:"29:27",text:"I don't think I've thought too much about it in that specific context of past and present. But I think a must for us is a ceremony that's small enough that every single person there has a chance to meet every other person and build those relationships and connections."},
      {time:"29:55",text:"I feel like that organically is only going to happen if you've got a certain number of guests — because after a certain point you're like, well, that's just too many people, I can't physically, logistically meet every single person."},
      {time:"30:00",text:"We've got a shared Pinterest board and an Instagram saved list where we're like, these would be some nice things to do. We've got a couple of cats that we're very close to and we absolutely love — we wanna see if there's something we can do to have them involved."},
      {time:"30:38",text:"That sounds very whimsical and very weird maybe to some people, but it's important to us because that's a part of our life. We've had the cats for 8 years."},
      {time:"31:07",text:"Going back to that point about what's unique and how you integrate some of the past stuff with some of the future — having something which involves the cats. I don't know how that would work, they're not quite like dogs who can walk a basket of flowers down the aisle."},
      {time:"31:17",text:"The other thing — we're both not quite religious. Although we come from families who are more religious, and more — at least my family is more conservative compared to my partner's family."},
      {time:"31:31",text:"We don't want to do something that doesn't really feel real — like we're doing something for the sake of doing it. But at the same time we don't want to essentially move completely away from something to the extent that our parents are disappointed."},
      {time:"32:05",text:"So there would be some sort of religious angle involved. Not a complete thing like the way they used to, but not zero — sort of that spectrum in between, and us identifying what level we're comfortable with."},
      {time:"32:21",text:"To give you an example — for a Muslim wedding, on the very conservative end it would be held at a mosque. All the way on the other end, there'd be a religious figure who sort of walks you through your vows — they act as the witness and help you sign things. That's the bare minimum for a Muslim wedding."},
      {time:"32:52",text:"So we'd probably do that, and then have a little bit of... some sort of prayer ceremony kind of thing — a much smaller one compared to what families are used to back in India — integrating that into the wedding so they don't feel like we're completely abandoning our customs."},
      {time:"33:25",text:"And there's something I didn't go into previously — we both live in Australia, we see it as home. Our families have never visited Australia. So for them it's going to be a new experience as well."},
      {time:"33:39",text:"For me, I'm generally a very logical person, and I'm like — well, at some point our families are going to visit, or we would like them to come and experience an entirely different culture and continent. So if we integrate it correctly, we could do both."},
      {time:"33:50",text:"Invite them over for a nice little holiday, and then the wedding is sort of the cherry on top. Then we feel like we have ticked those boxes as well — because coming from that cultural background, there is often an expectation that you take care of family."},
      {time:"34:43",text:"Living in a different continent, we haven't had a chance to do some of that. But this feels like an opportunity where we can have them involved in the wedding, invite them over, have a mini vacation for them as well."},
      {time:"35:06",text:"It would be more of a destination wedding except that we're not doing the traveling — they're doing the traveling to come to Australia. Doing our own little unique things which all kind of come together into great memories for them and for us."},
      {time:"38:13",text:"In terms of involvement in the wedding — can you walk me through what that looks like? Is it being a guest? Is it planning a certain element? Is there a specific ceremony you'd want any of the parents involved in?"},
      {time:"38:30",text:"So if we're talking about the option where they fly over — keeping in mind it's a country they've never visited before and it's culturally quite different — we really wouldn't expect them to know too much about the local landscape logistically."},
      {time:"39:00",text:"From that point of view, they would definitely be guests — invited over with most things curated for them. But that's not to say there wouldn't be elements we could leave to them."},
      {time:"39:17",text:"There's a big emphasis on families exchanging gifts in subcontinental weddings. That's something we can kind of say, we recognize there's something you families have always done — you know this part better than us. We've never gotten married, you've attended a lot of different weddings. So we'd leave that bit up to you."},
      {time:"40:13",text:"Another aspect — there would be a formal ceremony that we'd take the lead on. But often, before and after, there are a lot of informal things: inviting the other family over, doing a nice little meal, a lunch or dinner. We'd be comfortable helping them do that."},
      {time:"40:53",text:"We'd probably ask my family to do something which makes them feel like they've fulfilled their hospitality obligations — and then the same way my partner's family would get our family over for a meal. They feel like they've done their bit as well."},
      {time:"41:19",text:"It would be a scaled down version of what would have happened back in India, where calling the other side over would mean inviting not just them and their family but their extended relatives, which would easily be in the hundreds."},
      {time:"41:57",text:"Obviously we're moving away from that — much smaller scale. But I'd hope they get a similar experience and sense of things. Familiar enough that it's OK. But also they don't feel like we're giving them something to do just for the sake of it."},
      {time:"42:40",text:"You kind of don't want it to come across as fake or shallow, or like you're asking someone to do something just so they don't feel like they're missing out — but then it has no significance."},
      {time:"43:03",text:"You made just one comment about never having planned something like this before. In terms of planning the Australian ceremony — is there someone you're thinking about working with? A wedding planner, an elopement consultant?"},
      {time:"43:47",text:"Absolutely. We both work full time, and even doing what we did last year — we recognize the limits of what we're capable of. We'd probably want someone involved who we can have a few discussions and meetings with, and set the expectation of what we're after."},
      {time:"44:14",text:"Like, essentially — you've got an understanding of what we're after, and then you go away and you come back and say, right, based on our discussion, this is what would be good. Does that sound good? Do we tweak something?"},
      {time:"44:38",text:"We've started looking at a few options in Australia — how does something like this work, is there a wedding planner we could tap into? Just being cognisant that it's something we're not looking to spend a lot of money on."},
      {time:"44:50",text:"There's a line in the sand where we'd say it's probably too expensive to hire someone to help us plan the wedding — maybe it's better we just take some time off work and plan it ourselves."},
      {time:"45:17",text:"If there was someone who offered a guided location discovery and ceremony package — where there were options for you to choose from, they helped you build that experience, but it was a comprehensive package — what would be your off-the-cuff thoughts?"},
      {time:"45:48",text:"We'd be 100% keen on exploring that. There are already elements of this where it's almost a vacation wedding for our family. If we're not doing it in a city we're familiar with, we'd probably want someone who's familiar with that destination and can package it all up."},
      {time:"46:23",text:"If you're looking to do this many people, it's gonna be this much per person — if it's 15 people, this much per person. That kind of just simplifies things for us. And as long as it ticks the boxes for us."},
      {time:"46:57",text:"Someone that's culturally sensitive and understands where we're coming from, and the rules and regulations and the obligations — especially in terms of Islam and halal food. Someone who understands all of these things and packages it all up, comes back and says, right, these are three options."},
      {time:"47:12",text:"It takes away a lot of the logistical and planning elements for us. Maybe that means we don't have to take time off work or lose income planning this thing, and we can keep working while ensuring we're touching base with this person."},
      {time:"47:29",text:"So while it would be important to have a celebrant from the same faith to conduct the ceremony, you'd be open to working with a planner who might not be from that same faith background, but was respectful and knowledgeable?"},
      {time:"48:02",text:"Correct. It's not too hard. There are just elements of weddings from different cultural or religious backgrounds — as soon as you understand what sets them apart, and you cater for that bit, you tick those boxes. Everything else is almost the same logistically."},
      {time:"48:39",text:"For example, no alcohol. And on the more conservative side, there also wouldn't be music or dancing. These are things that fundamentally change. You'd be like, is it even a wedding? But yes, it would be."},
      {time:"49:00",text:"But as soon as you understand and acknowledge this, and say — right, if you're not doing this, what alternatives are there that would serve the same purpose — then we're good."},
    ]

      {time:"0:01",text:"Awesome."},
      {time:"0:05",text:"Hi, Greg, nice to meet you."},
      {time:"0:07",text:"Nice to meet you both as well."},
      {time:"0:10",text:"Have you done something like this before, this kind of like user research, one on one session?"},
      {time:"0:15",text:"I've done a ton of them, yeah, I really enjoy them."},
      {time:"0:19",text:"Sounds like you're an old hand at this. I'll give you a little bit of context about what to expect, and then you can ask me any questions, and then we'll jump right into it."},

      {time:"1:16",text:"The last thing I would say — I know that part of talking about a big life event like this, like a wedding, we might be touching on a range of different topics: family, relationships, etc. If there's ever a question where you're like, I don't think I want to get into that today, no worries."},
      {time:"1:39",text:"Sounds good."},
      {time:"1:42",text:"No, I think we're all good. I must say though, you've got a lovely voice — very soothing, like an ASMR sort of relaxing voice. Very soothing, yeah."},
      {time:"2:01",text:"Greg, I do have your survey open in front of me. But I just wanted to ask you and kind of get your perspective. You mentioned that you're recently married in the last 2 years."},
      {time:"2:17",text:"Yeah, so it was about 5 weeks ago."},
      {time:"2:22",text:"Oh, congratulations."},
