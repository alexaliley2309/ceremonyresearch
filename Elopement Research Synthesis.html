      {time:"2:25",text:"Can you tell me a bit about that — leading up to that? Where did you meet your partner, and what that planning to get married looked like for you?"},
      {time:"2:37",text:"It's very unusual I guess. We've been together for 16 years, so it's been a long time."},
      {time:"2:43",text:"Ever since I was a kid, I'm not anti-marriage — I just never really saw the point in it. But she's always been... that's fine, but she would prefer to get married. And at the same time we're kind of planning for retirement overseas, so we've been discussing marriage on the sidelines because it's just gonna make retirement overseas so much easier."},
      {time:"3:13",text:"And then one night we were kind of discussing those retirement plans and it basically stumbled into like a marriage proposal slash agreement."},
      {time:"3:25",text:"Yeah, so not very traditional at all — just kind of stumbled my way into it."},
      {time:"3:31",text:"And then once I got to that stage, she kind of locked it in and she booked in everything like the next day."},
      {time:"3:56",text:"You mentioned it was 5 weeks ago and it sounds like there was a lot of planning that your partner did in terms of the logistics. Can you tell me a bit about that? Who planned what?"},
      {time:"4:14",text:"She was like, right, let's get married straight away. And in Queensland it takes about 1 month to 5 weeks — there's like a cooldown month sort of a thing from the process of saying I want to get married to submitting it."},
      {time:"4:42",text:"And then it took a couple of weeks to actually get a booking with the celebrant that we were after."},
      {time:"4:53",text:"So essentially as far as planning goes, we just wanted something as basic as possible."},
      {time:"4:56",text:"We ended up going with no guests at all, just us and the celebrant — just because we just want it simply done."},
      {time:"5:06",text:"We didn't even tell anyone."},
      {time:"5:08",text:"Just kept it a secret until after it was all done. We just wanted it kind of done and dusted."},
      {time:"5:13",text:"Not in a non-romantic business way — just in a not-bother-anyone-else sort of way."},
      {time:"5:27",text:"So when you hear the terms elopement versus micro wedding, do either of those terms feel like they land for you in terms of what your experience was?"},
      {time:"5:36",text:"So that was for a cooldown period — you say to the government I want to get married, and then you have to essentially wait a month for the paperwork and the back end to be ticked off by the government. Some mandatory 4-week waiting period."},
      {time:"6:14",text:"When y'all were planning that — when you hear the terms elopement versus micro wedding, do either of those terms feel like they land for you?"},
      {time:"6:29",text:"Well, just before this I was actually Googling what specifically is an elopement — because I always thought it was where you actually run away, like you just leave your hometown and go and do it. Maybe that's the movies' version of it."},
      {time:"6:45",text:"But I realized we technically had an elopement because we didn't tell anyone about it — it was in secret. I think that's the definition of an elopement."},
      {time:"6:55",text:"While a micro wedding is like 10 or fewer guests or 20 or fewer guests or something like that."},
      {time:"7:14",text:"Yeah, yeah, exactly — we did have that privacy element that was really just for the two of us."},
      {time:"7:17",text:"Can you tell me a bit about the celebrant process? Did you have any expectations of the kind of celebrant you were looking to work with?"},
      {time:"7:33",text:"Well we're both very simple people, kind of more basic nature sort of thing, nothing fancy."},
      {time:"7:43",text:"So we went through probably a week or two of just Googling celebrants because there are so many of them. It's hard to really differentiate them."},
      {time:"7:56",text:"And there were a bunch of them that were kind of like celebrant slash DJ — you know, kind of loud party sort of people, and we weren't after that at all."},
      {time:"8:08",text:"And also a lot of the celebrants didn't really do elopement sort of weddings. It was more micro wedding at a minimum — probably because they could charge a bit more in fees."},
      {time:"8:27",text:"But we managed to find just a small celebrant, and we did it on her back deck at her house, which is very cute, very nice. She does a bunch of them there."},
      {time:"8:41",text:"There were a few celebrants who do it at certain specific spots around town — Kangaroo Point, up in the forest somewhere. But we just ended up with this one because it was just more basic and a little bit cheaper."},
      {time:"9:06",text:"I'm curious — when you use terms like nothing fancy, basic, simple — how did that play out for you in terms of the experience you were hoping for?"},
      {time:"10:20",text:"Yeah, my partner talked to a couple of the celebrants on the phone just enquiring, and often they came across as very salesy, trying to push you into it."},
      {time:"10:38",text:"So we wanted one who would go with the flow — not salesy — just minimum fuss possible, really."},
      {time:"11:01",text:"Someone who can just kind of be nice and get out of the way — and not throw their own stamp on the occasion, like a lot of the DJ sorts would where it's a little bit about them and their big personalities."},
      {time:"11:20",text:"When you say minimum fuss — for some folks that means no flowers, for other folks no music, no witnesses apart from required ones. How does that play out for you in terms of the experience you were looking to have?"},
      {time:"11:51",text:"We were after — the law tells us we have to do it a certain way: you have to have a celebrant, you have to do the signing etc. — which is fine, but we wanted kind of minimum impact from that."},
      {time:"12:19",text:"We wanted that to very much be a side dish to the main course sort of a thing. So it had to really fit in with us."},
      {time:"12:39",text:"Sometimes people decorate the signing — it's a whole thing in the ceremony. For us, we wanted that part minimized."},
      {time:"12:46",text:"Yeah, you're saying it better than I can — some people love the big extravaganza of it. But we're just not like that."},
      {time:"12:56",text:"So if we're thinking about what was de-emphasized for you — what did you want emphasized? What felt valuable, what made it feel meaningful?"},
      {time:"13:14",text:"For me, the whole meaning is just being there with my partner, becoming my wife, just making it official. That's the whole meaning for me. The rest of it is just love, basically."},
      {time:"13:37",text:"We didn't even have any extra flowers or anything — it was a nice little setup she had. Just basically a table and two chairs. And a dog was running around as well and that was great. Everything we could ask for."},
      {time:"13:57",text:"I know we're just very unusual people in how small scale we want."},
      {time:"14:14",text:"Yeah, it's just like another day, but a much more special day sort of a thing."},
      {time:"14:24",text:"We're just not like... a lot of events have a whole lot of artificial side to them. Even a birthday you stick up balloons and writing, but that's technically artificial. You don't necessarily need the balloons to have a great time — and that's kind of how we are."},
      {time:"14:59",text:"Yeah, a lack of artifice — something that really felt authentic to just who you were in your lives."},
      {time:"15:01",text:"Yeah, yeah, yeah, exactly."},
      {time:"15:17",text:"It was just very much a simple sort of profile. A lot of the celebrants are more about advertising themselves, showing all these events they've done, all the different things they can do for you."},
      {time:"15:40",text:"It probably suits 99% of people out there. But we just wanted someone who looked like a normal person — not in the whole wedding look with super dressed up, lots of makeup on."},
      {time:"16:01",text:"I'd probably use the term a bit more hippie-ish, you know, flower power sort of a thing."},
      {time:"16:11",text:"When you think about broader society — religious, cultural, social media expectations — were there any that played into how y'all approached the ceremony?"},
      {time:"16:33",text:"We definitely didn't want to have pressure on the day. Even planning the little bit that we planned, it was surprisingly a lot to do — even with no guests."},
      {time:"16:50",text:"Just several times we commented to each other — imagine doing this for 100 guests — it'd just be such a pressured situation. You'd be glad it's all over rather than being there and celebrating, or having to talk to 100 people for 1 minute each because that's all the time you've got."},
      {time:"17:09",text:"It'd be an absolute nightmare. I can't imagine that actually being a relaxing, happy day — it seems like a very stressful day, which is the opposite of what we wanted."},
      {time:"17:21",text:"When you mentioned there was surprisingly a lot to do — can you walk me through the steps and decisions?"},
      {time:"17:40",text:"Obviously the basics like what to wear, timing for the day regarding things like taking days off work."},
      {time:"17:55",text:"We had a bit of a problem. We were trying to book a photographer to get some shots done at a park afterwards or in a nature area."},
      {time:"18:08",text:"We couldn't even — it ended up all falling through. It was surprisingly difficult to just get a basic photographer out for anything less than like $800."},
      {time:"18:30",text:"Most of the stress was on that photographer. But apart from that there was still a fair amount of signing and paperwork and sending back and forth details between the celebrant and us — things like your parents' names and general information."},
      {time:"18:45",text:"Just a lot of small things that add up."},
      {time:"19:09",text:"The celebrant had a whole step-by-step process of what was necessary to legally tick all the boxes, and she sent that through to us — that was very helpful."},
      {time:"19:40",text:"No, we thankfully contacted the celebrant first before we even looked into that whole paperwork process and she really simplified it. She sent off a lot of the documents for us — even the official marriage certificate. She did basically all the paperwork."},
      {time:"20:06",text:"So it sounds like she was a bit of an event planner, a project manager almost for the event."},
      {time:"20:13",text:"Yeah, she said she's been doing it for 20-30 years, so she knew everything."},
      {time:"20:28",text:"She would have gone anywhere — just would have cost a fair amount more. And you run into tricky situations if you're in a public area with members of the public around. We just wanted everything as simple as possible, and she had a bunch of pictures of people getting married on her deck and it just looked lovely."},
      {time:"21:16",text:"Really the only thing that surprised me was the cooling down period — a month or so. I was very shocked that you can't just go out and get a quick wedding. The Americanized version in my head."},
      {time:"21:41",text:"And also just the paperwork amount. Luckily my partner did most of the paperwork — when she has something in her head she's all over it. She changed her name to my surname in about two days straight on the phone."},
      {time:"22:23",text:"In terms of what you spent your time on — does anything stand out as feeling a little pointless, or on the other side really worth it?"},
      {time:"22:32",text:"Because we took that minimal approach, everything we had to do for it had a point to it. So nothing was really a bother. No problems with anything we did."},
      {time:"23:12",text:"Well, we went out for a nice dinner of course with some friends. But photographer — honestly, we're probably more the sort of people who will celebrate wedding anniversaries more than the wedding itself. Just turn it into a restaurant night for a week or something."},
      {time:"24:23",text:"No, we don't drink alcohol. We didn't have any food or anything there. Straight afterwards we went to our 80-year-old friend's house — she's very elderly, she's kind of housebound. So we went there and celebrated with her and told her we got married."},
      {time:"24:51",text:"Just had a cup of tea and a biscuit, and then later for dinner we went out."},
      {time:"24:56",text:"That's what I mean — we're very unusual people. Just a very low key celebration with loved ones."},
      {time:"26:11",text:"Was there anything the celebrant did in the service itself that made it feel personal for you and your partner?"},
      {time:"26:15",text:"Oh, it was just very informal. You can have the whole formal exchanging rings and vows — we didn't even do that. She says the official words over us, we give each other a kiss, then sign the paperwork."},
      {time:"26:33",text:"But meanwhile we're just having a nice chat with her and a joke, the dog's running around. As informal as it gets, but still very professional and warm at the same time."},
      {time:"26:50",text:"Just people being genuine people. No layers of nonsense on top of it."},
      {time:"27:08",text:"I think we just said over and over — we're just very simple people, we just want simple. And she probably read between the lines. Especially because we didn't invite anyone, she probably realized they just want to get it done."},
      {time:"28:51",text:"Yeah, absolutely. We did stumble across some of those sort of offerings, but they were always for larger size — minimum of 20 guests — and thousands of dollars. There's certainly no package like that for elopement or really micro micro weddings."},
      {time:"29:18",text:"But if there was a bunch of tick boxes and you get all the steps down — absolutely, we probably would have done that in the first place rather than having to essentially customize our own."},
      {time:"30:33",text:"I'd expect to pay anywhere between probably $1,000 to a couple of thousand. It would be anywhere from $500 to $800 just for the celebrant and the very basic wedding. And then when you're adding the location and the photographer — $1,500 on average I'd say."},
      {time:"31:44",text:"Just have to match up personality-wise with someone you're after."},
      {time:"31:49",text:"For us anyway — a bunch of the celebrants are a bit too themselves focused, which is a marketing technique, I get it. But it should always be about the people who are getting married first and foremost."},
      {time:"32:42",text:"My partner spoke to a couple of them and after about 2 minutes on the phone with one of them, she could see herself just about tearing her hair out. It was just a struggle of a conversation."},
      {time:"33:07",text:"If it's this kind of elopement private ceremony and it's just you and this other person, then all the personalities show up in a big way. You want someone who's facilitating but not coloring the experience with their own personality."},
      {time:"33:19",text:"For a big wedding, a celebrant who's an outgoing DJ sort can really lead the event and conduct the orchestra — that's great. But not for a tiny little wedding."},
      {time:"33:43",text:"I think locations are very important. You could have some crazy locations — a bungee jumping wedding or something like that. It might appeal to a certain audience."},
      {time:"34:30",text:"Yeah, definitely — that would have been awesome. An adventure/adrenaline style wedding. It certainly wasn't an option we could find, but yeah, that'd be great."},
      {time:"36:49",text:"Probably the concern about injury. Concerned that it's something your partner genuinely wants and you're not kind of forcing them into."},
      {time:"37:11",text:"There couldn't be anything more important than getting alignment with your partner when it comes to a wedding. But apart from that, not really any worries as long as it's legal and legitimate."},
      {time:"38:09",text:"The ceremony itself — the idea for us of having to make family and friends change their life around us is not something we're comfortable with."},

      {time:"44:33",text:"No, we're both kind of plain — neither of us are religious, neither of us... my partner's Polish but she's very Australian. So there was nothing, nothing cultural or religious, like I said. It was about as plain and bland as you can get — not bland, but plain."},

    transcript: [
      {time:"0:00",text:"So we'll go ahead and start."},
      {time:"0:00",text:"OK, so you mentioned about 18 months ago."},
      {time:"0:06",text:"Yes, yes."},
      {time:"0:09",text:"I'm hoping I've got a very strong — I've got Starlink here so I've got a very strong satellite thing, so I hope you can hear me OK."},
      {time:"0:20",text:"Yeah, 18 months ago, we eloped to Norfolk Island. It is beautiful — we love it. We've been there a couple of times."},
      {time:"0:29",text:"We had decided — Graham proposed to me in outback Queensland, in Longreach, very remote, about a year prior to that. And when we thought about where we were going to get married, we said, we don't want any fuss, we don't want any fuss at all, we don't want a cast of thousands."},
      {time:"1:01",text:"My daughter said to me, where do you want to get married? And I said, I'd love to get married on Norfolk Island. And she said, well just do it. So we did it."},
      {time:"1:17",text:"We had been there a couple of times. Graham loved it. We just found it very spectacular. It's in the middle of the Pacific Ocean, about 3.5 hours from Australia, halfway between there and New Zealand. Very beautiful, very scenic, a lot of history — it was a very harsh penal colony for convicts."},
      {time:"1:45",text:"We have a very relaxing time there and we feel very at peace there. It just attracts us there every year. So we go over there very regularly — I could live there, but it's probably a little bit small. I'm a city girl."},
      {time:"2:00",text:"We just thought that's it — and we knew exactly where we wanted to get married, where we were going to stay, and it was all bucket list stuff."},
      {time:"2:15",text:"I realised I skipped ahead a bit because we started talking about the location. I also wanted to ask you about the conversation towards marriage. Why did you decide to take that step?"},
      {time:"2:34",text:"Well, we were never going to. I'm 68 now, and Graham's just turned 70, and we met 20 years ago. I was 47 and he was 49. I'd been long divorced — divorced since I was 29. I'd raised a daughter on my own. Graham raised two boys, twins, on his own from age 12."},
      {time:"3:00",text:"We met when we were much older and we had no plan to marry at all. We were very happily living together. When you live together for over 6 months in Australia, everything is the same legally anyway. So we had no problem."},
      {time:"3:28",text:"But there was a bit of an estrangement between Graham and one of his sons. It went on for about 9 years — very bitter. I own my own house but we were living in his house, and he was concerned that if anything happened to him, they might come in and try and kick me out. It was worrying him."},
      {time:"4:01",text:"So he didn't marry me for that reason alone, but I think it was sort of in the back of his mind that if we got married it shored things up a little bit more. But apart from that, I was completely, totally surprised when he proposed."},
      {time:"4:21",text:"We were on a caravan trip into remote western Queensland. He took me out on the wing walk of this static jumbo jet in Longreach. He said to the guide, would you mind videoing this? And I'm going — what are you doing? He grabbed my hands and turned me sideways towards him and said, while I've got you up in the air — would you marry me?"},
      {time:"5:06",text:"I went, who — me? I literally said, what? He said, well, there's nobody else up here. So that was it. I was gobsmacked."},
      {time:"5:52",text:"It sounds like the proposal itself had a bit of a kind of element of privacy and beautiful scenery. So when you were starting to think about the marriage ceremony — how were you thinking about it? Especially because you'd been married before."},
      {time:"6:21",text:"We had both had the big first wedding — because you don't anticipate that you're going to be doing it again. I thought it was for life. Somebody else didn't."},
      {time:"6:35",text:"As much as I appear an extrovert, I'm a bit of an introvert, and we like to get away. We like it with nobody around us. We are very social people, but we like to get away on our own. And that was a big thing for us."},
      {time:"7:04",text:"We have many friends and our neighbors are wonderful people, and they were absolutely devastated after we did it, that they couldn't be part of it. But we wanted to just do it very quietly."},
      {time:"7:15",text:"We took just my very intimate family with us — and that was it. We had 7 of us with us and nobody in the rest of the world knew about it."},
      {time:"7:28",text:"You mentioned there are 7 people and you use the term very intimate — who from both sides did you feel needed to be part of that ceremony for it to be meaningful?"},
      {time:"7:39",text:"My daughter — my only child. My brother, my youngest brother — we're very close. He came along and he witnessed the ceremony, because we had to think about that too because we don't know many people on the island. Graham had his brother and his wife."},
      {time:"8:19",text:"Megan and Grant, Greg and Jill, Bruce, and the two of us — so it was 7."},
      {time:"8:33",text:"My daughter, Bruce, and Graham's brother were the witnesses. Yes — they signed the paperwork."},
      {time:"9:02",text:"Graham would have been happy just the two of us going over there and nobody else. But I said to him, I really need my daughter there — she and I spent 20 years of the first of her life with only her and I, and it was very special. I can't do that without Megan there."},
      {time:"9:26",text:"And then Graham said, well, what about Jill? He gets along very well with his older brother. I didn't want it getting any bigger than that, and we kept it very quiet. Nobody knew other than that."},
      {time:"9:56",text:"I've got other family, but nobody knew."},
      {time:"10:41",text:"It was very casual. I didn't want anything very formal. I just bought a lovely beautiful blue dress with sort of embroidery."},
      {time:"10:51",text:"I planned everything — to the point that we rented this most magnificent property on the island. A house hanging off a cliff top, 3 levels, like a pole house. It was one of the most luxurious houses over there. And so we all had our separate bedrooms and the magic view over Norfolk Island and the water."},
      {time:"11:19",text:"I had planned to get married on the deck area off the side, with this magnificent backdrop of the ocean. I planned along to just step out from the house and we'd go out there and get married on the property."},
      {time:"11:36",text:"But when I got over there on the Monday, I'd organised everything from Australia — quite difficult with Norfolk Island because phone systems are a bit bad and mobile reception is difficult. But I sent a lot of things by email. When the photographer came up on the Monday to meet us and suss out the backgrounds, she realised it was going to be the wrong time of day for that particular backdrop — the sun was at the back and it was going to be terrible."},
      {time:"12:17",text:"I was actually devastated to the point I became a bit of a bridezilla. I was very upset because it just wasn't going to work. And that's what I wanted — to get married there with no fuss."},
      {time:"12:34",text:"The next day we went hunting for a location. We went down to the former convict colony — there's a place called Emily Bay, just magnificent, with these historic old ruins of buildings. One called the Salt House, where they used to preserve food for the convicts with salt. There's only some walls left on it, but it's the most magnificent buildings."},
      {time:"12:55",text:"My daughter and Graham and I and her husband walked into this area and I said, this is it — this is absolutely it. It was like a park area with the Salt House there. And I said, we'll just stand under these beautiful trees with the Salt House and Emily Bay in the background. That's it."},
      {time:"13:24",text:"It worked out even better because now we all talk about it. I could never have gone back to that property again unless I rented the house, and it's actually being sold at the moment — so it was better that we married off site. We've gone back there twice now to where we got married and stood on that site and said, this was so much better."},
      {time:"14:08",text:"Yes — after I got over the fact that it wasn't going to work up at the house. Yes, absolutely. And they've actually used photographs that I took on the day on the Norfolk Island tourism Facebook pages. People come in and ask, does anyone know a celebrant or how do you get married over there — and I've been able to come in and help them with advice on who to contact, photographer, celebrant, location."},
      {time:"15:05",text:"You mentioned you're a bit of a local expert now in planning. And you mentioned that when you were planning it was a bit long distance — the email and phone sometimes being a bit tricky. Can you walk me through the steps from the proposal to figuring out the photographer and moving locations?"},
      {time:"15:32",text:"Yeah, so it was 12 months between the proposal and actually getting married. But there was a lot in between."},
      {time:"15:42",text:"We were scheduled to be married on the 10th of February that year. And at the end of the year before, it was found that I had severely blocked arteries in my heart. So my cardiologist said, there will be no flying. Everything was in chaos — I had to cancel everything."},
      {time:"16:13",text:"I thought, where do I start? I've got to find out who's going to marry me. I didn't have anyone I knew over there, so I put something out on Facebook and did some research online. I started with the Department of Births, Deaths and Marriages — that's what we call it in Australia."},
      {time:"16:49",text:"Norfolk Island is a part of Australia — it's a territory. So nothing changes when you go there. Same currency, governed by Australia. I knew things would be fairly easy."},
      {time:"17:08",text:"I got the email address for the Department of Births, Deaths and Marriages over there and did a very generic email off to the registrar. She came back to me pretty straight away — Katie, her name was Katie — and she gave me all of this information. She said she performs wedding ceremonies in the registry there, or she'll go anywhere on the island to marry you."},
      {time:"17:43",text:"I thought, this is wonderful. She's a lovely woman. We started a relationship, back and forth. She actually gave me contacts for anything I needed. Katie is a local — she's born on the island. She gave me a friend of hers who was a photographer. She gave me hairdressers. She gave me lots of advice on things. So Katie was my go-to."},
      {time:"18:16",text:"I did a lot of research — I had people on Facebook complimenting Katie on her previous weddings, and I was able to Google and find weddings where she had officiated and see photographs."},
      {time:"18:57",text:"I was looking probably for locations — I know the island very well. I was also trying to see Katie herself — not that it would have mattered, but she was gorgeous and very vivacious. And she was happy to do things the way we wanted them done, and I felt very comfortable with her. I was looking for where people were, what they were wearing — just to get a feel for it."},
      {time:"19:19",text:"I didn't want a man. There was one celebrant over there who was a man — and he was very dictatorial with the way he did things. Katie was happy to do things the way we wanted them done."},
      {time:"20:13",text:"I emailed him and made contact and told him what I was doing. He came back at me with bullet points — what he would do, primarily the costs, this is the way I do it, that's it. It wasn't going to be any give or take. And I went, no. That's not the way this is going to work. I didn't even respond back to him."},
      {time:"21:09",text:"She's actually a friend now — when we go over there, I get a big hug when we go up to see her. She's the deputy registrar of Births, Deaths and Marriages, so she's quite high up in the government. But she was willing to do anything. She even fluffed up our vows for us — she thought they were a little bit short, said she'd add some bits. She did a beautiful job. It was like I'd known her forever."},
      {time:"22:04",text:"Very much, very much. And when I had to postpone it due to the triple bypass, she just put everything on hold. She said, that's OK, we'll just reschedule it for October — we'll put it all in abeyance and I'll wait on you. So it didn't worry her at all."},
      {time:"22:37",text:"So the steps were: find the celebrant through the registry, a bit of back and forth there. Then the celebrant stepped into almost like a wedding planner role — suggesting different vendors, helping with paperwork. Once that was taken care of, what were the other steps?"},
      {time:"23:16",text:"Well, I booked all the accommodation. I booked 3 hire cars so that everybody — I paid for everything. I wanted everyone to have a really good time."},
      {time:"23:25",text:"We thought, if you're coming with us and we've asked you to come, we're shouting — we're paying for you. So they all said no, no, no — they paid for their own airfares, about $1,000 from Australia. I provided accommodation, which was luxurious, 3 hire cars, transport from the house — and I booked a restaurant."},
      {time:"23:58",text:"It's the most beautiful restaurant on the island — very high calibre, it's called the Homestead. We'd been there before. I said to Graham, we've got to have the wedding dinner at the Homestead. They book out, so you've got to book online like 6 months before."},
      {time:"24:18",text:"I actually worked the wedding day to be Thursday because this restaurant is only open from Thursday to Sunday. So everything hinged on everything else — flights, date, ceremony time, transport, restaurant booking. It all had to work together."},
      {time:"24:52",text:"I guess it's like any wedding really, but a little bit harder over there because there's only one taxi on the island. It's like a minibus. They came and picked us all up and took us to the restaurant and they'd set up the most beautiful little area off to the side for us. It was just magic."},
      {time:"25:32",text:"Oh yeah, well, the fellows — we went to the duty free at the airport on the way over and bought 6 bottles of Moët. So we had the wedding ceremony, and then we had champagne down there — they took it down — we had a toast while signing at a picnic table. It was really casual."},
      {time:"26:06",text:"And then we went back up to the house and took the photographer — Jolene, I love that name. Katie recommended Jolene for the photography — she knew her work, they're very good friends. So we took them both back up to the house and we all stood out on this magnificent deck overlooking the Pacific Ocean and had drinks before we went to the restaurant. It was beautiful."},
      {time:"26:42",text:"I didn't have any flowers — it was just casual. But hair — I looked up hairdressers. Katie gave me some contacts and I made an appointment for myself and my sister-in-law. She wanted her hair done, so we went to the hairdresser before the wedding. Drinks, dinner, hairdresser. That was about it. We kept it very minimal."},
      {time:"28:11",text:"Norfolk Island — you can't use your phone over there. You have to buy a local SIM card. The phone network is very old-fashioned. So when you get to Norfolk Island, you're really quite remote. Dealing with them had to be all by email. I think I called Katie once, and that cost a fortune. It's like dealing with an old, old world. They love it that way, and I love it for that reason."},
      {time:"28:41",text:"Probably what surprised me was that it all came together so easily — and the fact that Katie was so helpful. She was not required to give me all of that advice or those contacts, but she willingly did."},
      {time:"29:07",text:"We paid the official fees to the government, but we also gave Katie an envelope at the end with a couple of $100 in it — for doing this for us. She never expected it, but I think everyone does it. She'd finished work across the way in these magnificent old convict buildings and just wandered across to Emily Bay for us on her own time."},
      {time:"30:09",text:"When you mentioned the location was public — how did you know it would remain private enough at the time you chose?"},
      {time:"30:18",text:"Well, there's only so many people who come onto the island. There's only one Qantas flight in every day. And late in the afternoon — there were people swimming in Emily Bay, which is a nice time of year. That didn't bother me one little bit. There was a couple of picnic tables and we were like on a little peninsula with this Salt House."},
      {time:"32:44",text:"Katie said to these ladies who were finishing up — and they jumped in and said, oh no, no, we're leaving, we'll get out of your way. So they left and we had the whole place to ourselves. And I said, oh I'm so sorry, and they said, not a problem — they were quite chuffed that Katie was there and she was marrying us."},
      {time:"33:31",text:"There was people swimming on the beach, but it actually added to it. It just created the perfect casual vibe that we were looking for."},
      {time:"33:52",text:"What comes to mind when you hear the word elopement, and what comes to mind when you hear the term micro wedding?"},
      {time:"34:01",text:"Elopement to me means we've gone off and got married. We haven't told anybody. Because what we did the next day was we just put something on Facebook — beautifully written, it just says, we did it. We eloped. And that told the world. The place went nuts."},
      {time:"34:23",text:"To me, it's going away from everything. Elopement probably means just the two of you. But for us, the extra people didn't really matter — we still called it elopement. They were our witnesses, but it was a secret from the world. An elopement is you don't want anybody really but you there."},
      {time:"34:51",text:"A micro wedding — I think we probably fitted that as well, because it was just a very small number there. An elopement is probably you two plus maybe witnesses, whether you've dragged them out of the pub or two people you don't know. A micro wedding is a small number of people — we probably fit both categories, but we call it an elopement."},
      {time:"35:22",text:"Because you felt like it had that secretive element and it was the going away to the location."},
      {time:"35:28",text:"Absolutely — to me, elopement is going away. A lot of people would elope and just go to the registry office or down the park, but to me elopement is going somewhere further."},
      {time:"35:53",text:"Can you tell me if there is something you ended up spending time on that in the end didn't feel as worthwhile?"},
      {time:"36:01",text:"Probably I spent some time dwelling on getting married at the property. I fixated on that too much. I was determined I was getting married at the property, and the change in plans really threw me for a day."},
      {time:"36:42",text:"In the end we took the 3 cars down to Emily Bay. I didn't really want to have to do that. But in actual fact, in hindsight, I wish I hadn't fixated so much on that. I wish I'd been a lot more flexible. I think I fussed too much."},
      {time:"36:59",text:"There was nothing that I regretted. My shoes were inappropriate — I had beautiful court shoes with a slingback and heel because we were going to be on the deck of the house. I ended up in a park on the grass. Just a tiny thing."},
      {time:"37:56",text:"Elopement to places that are way away from where you live normally — you've got to think so much more, you've got to have everything set in place. There's no going into the city and buying something else you needed badly. You've got to make sure that with an elopement, you have it all. I would have been devastated if I'd left my shoes behind in Brisbane."},
      {time:"38:44",text:"If I can ask — it does feel like there's quite a bit of phone calls and emails and making all these reservations. If you were working or had younger children, do you think you'd have felt as comfortable, as confident you'd have the time to plan all of these steps?"},
      {time:"39:19",text:"No, perhaps not. No, I've got time to do it. And I think that was the godsend — well, plus the fact that we had to postpone it because I had to recover from open heart surgery for 3 months."},
      {time:"39:29",text:"We had to change airfares, cancel airfares and make new ones — cost involved. I was costing the people coming with us, so I was aware of that. I invested a lot of time and energy into it. I had the time. But I think that's why a lot of young ones — although I see some beautiful elopement photos of young ones in Brisbane who have done an absolutely fantastic job. I sometimes think, you look magnificent, but you didn't want anyone to see you."},
      {time:"40:21",text:"If it was me the first time — which I had the works, the 3 metre train — I'd want people to be there. But it's horses for courses — it's what suits you."},
      {time:"40:55",text:"You mentioned you're a bit of a local guide now for folks who want to elope. When you think back to the kinds of questions other folks are asking you, what comes up for them?"},
      {time:"41:08",text:"They're just not aware of the fact that Norfolk is part of Australia — they were concerned about the legalities, the paperwork and that. And I sort of said, if you go through Katie, it's through the Department of Registered Births and Marriages — she will guide you through all of that. It's the same as Australia."},
      {time:"41:31",text:"The only stumbling block we found — which was after we were married, when I came back to Australia and was trying to change my name on my driver's licence and everything — Norfolk Island is so manual, not digital. We had a wedding certificate from Katie, but Australia had no record of it. I had to use a hard copy and send it in. Centrelink were the hardest — I had to scan everything and send it in because Australia and Norfolk Island just weren't connected."},
      {time:"43:34",text:"We went and had a meeting with Katie when we first got there — just to talk about all of this stuff. She got the paperwork going, we took all the paperwork we'd emailed over for hard copies. She went through a whole lot of that stuff and put us at ease."},
      {time:"44:06",text:"Someone last week said they're eloping over there and want to know the best restaurant for dinner. Well, I went straight in — the Homestead, but you must book online and they're only open from Thursday to Sunday. I told them briefly what we did, and if it helped, great."},
      {time:"44:59",text:"We wanted to celebrate, absolutely. It was the whole week that was a celebration. And we tried not to make it about us, but it was about everyone — the 7 of us being there. And it was special."},
      {time:"45:26",text:"I said if we're going to do it, we're doing it small and we're going to do it with quality. I wanted it to be exceptional — I wanted them all to have a great time. And it wasn't about celebrating us. I just wanted us all to have a wonderful, wonderful week."},
      {time:"46:05",text:"Well, they were all special people to us — we only wanted special people with us. And it worked out that way. We all talk about it still to this day. It was small, it was intimate, but it was special — and it was people we wanted there to witness us being married."},
      {time:"46:34",text:"I hope this helps — it's hard to get down to the nitty gritty. But I think it's research, organisation, collaborating with people at the other end — but not bowing to their constraints necessarily. Don't go away from what you want. Because you'll regret it."},
      {time:"47:04",text:"I probably regret being a little bit of a bridezilla about the patio — the fact that we couldn't get married at the house. But in actual fact, I feel apologetic about that now because it was so much better that we got married at a location we can go back to. And we have. Really special."},
    ]
  },

    transcript: [
      {time:"0:02",text:"Thanks, Lex."},
      {time:"0:11",text:"I have done a couple of these, but more for like different products and things like that. So I\'ve done a couple before, yeah."},
      {time:"1:24",text:"So my now husband and I, we\'ve been together over 10 years. We\'ve actually got two little kitties as well. So I\'ve got a 4 year old and now a 1 year old. We actually met at my parents\' house — my sister was moving overseas to England for quite some time, she was having a big going away party, and one of her friends actually brought my now husband to that party."},
      {time:"2:09",text:"I think having kids definitely changed that for us. And we always knew we wanted to get married — we were quite young as well. We got engaged, but we never actually legally got married. And then we had my son, and then we thought, you know what, we probably can get married now. It was just kind of what felt natural for us as the next thing."},
      {time:"2:59",text:"When I selected elopement on the survey, I wouldn\'t necessarily call it an elopement, like a traditional elopement. We went overseas, we went to Indonesia, and we just had like 30 of our immediate family and a few friends. We didn\'t have the extended family, traditional ceremony, church bells and whistles. It was more just a bigger celebration over a longer period of time rather than chucking all this money into one day."},
      {time:"3:51",text:"We wanted more of an experience and a party and more of a celebration over, you know, a week or two. We\'ve been to 1000 weddings, you know — even as a guest, it feels like it\'s just gone so quickly that one day. And we wanted to make more experiences and memories."},
      {time:"4:09",text:"Elopement means to me, it\'s just you and your partner going away, just the two of you, and getting married, coming back and then celebrating with your family — you\'re tying the knot without witnesses or your family present. That\'s kind of my interpretation."},
      {time:"4:54",text:"Absolutely — we went over for a couple of weeks, we celebrated my husband\'s birthday over there, a friend\'s birthday, we did the big welcome parties, did the wedding, we did another party the following day. We just wanted it to be like multiple events of fun, memorable times that we can look back on — the money we spent doing that with our nearest and dearest, having multiple experiences and a holiday away that everyone will talk about."},
      {time:"6:23",text:"It was something else because you\'re not just around the corner to go check on venues and suppliers. So we actually flew across the year before we got married to do a bit of a recce — to meet with who we need to meet with, I did a couple of trials for hair and makeup, because I was conscious that you\'re going over there and you don\'t want to just wing it on the day."},
      {time:"7:01",text:"We tied the recce trip in with my mum\'s birthday. So we went for a holiday the previous year for my mum\'s birthday, and used that as a bit of a recce as well."},
      {time:"7:17",text:"It kind of all started with finding the venue and the estate where we wanted to get married, and then the rest kind of had to follow on from there. Because we chose a place that has essentially 8 villas on it, so we hired out the whole estate. Immediate family and everyone could stay on the same place, and that\'s where we could host most of the events as well."},
      {time:"7:51",text:"The person who owned the estate had connections with wedding planners and coordinators. But there was still a lot of research I had to go into finding a celebrant — not that we legally got married over there, that just seemed too hard, but just someone to do a bit of a ceremony to celebrate."},
      {time:"8:34",text:"I actually think we found someone on Facebook — there\'s a lot of Bali wedding groups, and we used that to refer to people\'s own experiences with suppliers or celebrants. And we would have met with him the year before as well, because it just felt like, alright, this person is somewhat marrying us, even though they legally didn\'t — we should probably know them a little bit."},
      {time:"9:16",text:"Facebook groups we used a lot, and Instagram — there\'s a lot of Instagram accounts where suppliers get tagged, that was really helpful because visually you want to see what people\'s experiences are like. I found the hair and makeup person on Instagram because you get to follow their accounts."},
      {time:"10:31",text:"We actually went out for coffee and just had a chat, like it was a friend. And it just felt right. The vibe was correct — he was really nice, really personable, really helpful."},
      {time:"11:15",text:"He was going to be the person that made us not look like gooses — where do we stand, what do we do, what do we say. You feel probably more nervous about those little things. He kind of played that role — we\'ve never done this, so he would make sure we know what we\'re doing."},
      {time:"12:17",text:"We didn\'t officiate the wedding over there at all. We didn\'t legally get married. I did wear a wedding dress. It was more the aesthetics — we wanted one big long table, sharing feast kind of food, family style, and did a ton of florals down the table. It was like a bloody florist shop, it was insane."},
      {time:"13:20",text:"For us it was more like, that was the fun part. But the rest was kind of just a party — all the guys\' suits were off within 40 minutes. We didn\'t do the first dance. We did have desserts and cake, but it wasn\'t like standing there cutting the cake in front of everyone. It was probably a bit more relaxed — more about the cocktail bar and the DJ."},
      {time:"14:26",text:"I feel like, I was even at a wedding last Friday — they feel very rigid. One day, you\'re inside, mostly in churches or some kind of hall. You\'ve got a 25-minute ceremony, you get up, and then the bride and groom are gone for 3 hours having their photos. Everyone\'s standing around waiting. Then you sit down at the table and you eat. It just feels rigid."},
      {time:"15:00",text:"The bride and groom often miss out on a lot of the fun parts. They miss out on the cocktail hour and hanging out with their guests. It just feels like a really rigid itinerary for a day that you spend God knows how much on, and then it\'s 10 o\'clock and then it\'s over. It just feels wrong."},
      {time:"16:06",text:"Being a part of creating experience for our guests, and memories with them — that was the biggest part. Whether that was the actual wedding day or the day before, like we\'re all doing massages together, all the girls and the boys. Having drinks that night, swimming in the pool. On the wedding day, everyone jumping in the pool. Being part of the cocktail hour after your ceremony — you just walk from one spot to the next, grab a cocktail, mingle with your guests."},
      {time:"17:08",text:"One of our best bits — we just stood to the side of the wedding at one point, just looking back in at all our favourite people there on a dance floor, tops off, everyone\'s bloody hot. And no-one had to go anywhere — most people were on the estate with us. It wasn\'t like it hit midnight and you\'re saying goodbyes. You\'re waking up the next morning and enjoying breakfast together and reminiscing."},
      {time:"18:13",text:"You know, being a wedding guest, you do rock up, you sit there, you watch the wedding. Then you sit at the reception table and you don\'t even get to have a photo with them because they\'re running around. And you feel somewhat removed — you\'re not really creating a memory with them either."},
      {time:"19:11",text:"One of our friends just jumps on the mic and says something — there\'s no formality of like, now it\'s the father of the bride who\'s gonna stand up, everyone sit down. Just, yeah."},
      {time:"20:05",text:"We kind of really didn\'t want to make our wedding a burden for anyone else. For us it was about creating the best experience for everyone else. We didn\'t rely on anyone else to call a supplier for us. It wasn\'t like that, because for us it was about creating the best experience — we didn\'t want to burden anyone."},
      {time:"22:14",text:"Where we got married overseas, in Australia when you choose your venue, they\'re the chairs you get, they\'re the cutlery, the napkins — it\'s a cookie cutter template. What surprised me was we could select everything down to the toothpick on the table. We could really curate it. There was nothing we were told we had to have."},
      {time:"23:19",text:"The only thing I found somewhat stressful was the insurance side of it — trying to navigate wedding insurance. Is it even legit, what if we need to use it? When you actually delve in: if the volcano goes off, what are we gonna do?"},
      {time:"24:22",text:"We\'re completely outside. There was a contingency for a marquee, but in Indonesia they\'re very spiritual — they have rain charmers. He\'s got like a 95% success rate. It was forecast to rain the night before our wedding, we\'re like, oh crap. So we got a rain charmer out to the estate. He did his full spiritual ceremonies. And then sure enough, the sun came out that afternoon."},
      {time:"27:31",text:"The only thing we didn\'t get was a videographer. When it comes down to costs, do we want it, do we not? I love our photos, they\'re incredible, wouldn\'t change that. But would I change maybe getting a videographer, maybe just to capture the wildness that had occurred and play it back one day — maybe."},
      {time:"28:27",text:"The wedding planner — without a doubt, there is no way we could have absolutely done that without her and her right-hand person. There\'s just no way. Their extensive knowledge, just even supplies — she doesn\'t care if you use whoever, but just being able to coordinate those meetings to source items. We\'re from overseas and there\'s a language barrier with a lot of locals. A non-negotiable whatsoever."},
      {time:"29:12",text:"Even giving options and ideas that we hadn\'t thought of — like timing of the event, talking about lighting, why a certain time for a ceremony at a certain spot is good versus another because the light comes down at this point. Things that I would never have thought of. Or family style sharing dining — very traditional in Indonesia — making sure that we considered that."},
      {time:"32:43",text:"A micro wedding is what I would say we probably did — more like a small wedding. So a small wedding versus an elopement: the micro wedding is still you\'re officiating in front of witnesses or your family, whereas the elopement I feel like you\'re going off and doing that with your significant other by yourselves, and then maybe coming back and having a celebration where you announce that you have eloped."},
      {time:"35:30",text:"I think a package would be useful. I think about the spreadsheets I was running trying to organise a whole lot of different suppliers. There\'s pros and cons because we were very specific in what we wanted, so having that autonomy was awesome. But at the same time, you\'re trying to coordinate so many different moving parts and people that may not have worked together before — that can obviously be risky."},
      {time:"36:00",text:"A package is super useful — especially when it comes to even just a celebrant, or a choice of two celebrants, so you\'ve still got a little bit of autonomy. You\'ve still got autonomy over your flower supplier. Packages but with a range — still a little bit of flexibility. It would certainly reduce the time spent in research."},
      {time:"38:54",text:"It just didn\'t feel right — I would\'ve hated to have woken up on the day after our wedding, gone to breakfast, and the people that were with us having the best time the night before aren\'t there. I wanted everyone there. That was the key — finding that venue and working back from that."},
      {time:"39:09",text:"Finding that venue and then working out a wedding, because this was just purely a location that people go on holiday — they\'re not doing weddings there every week. We chose it because it was beautiful and it let us build the event around the residential experience."},
      {time:"41:06",text:"I sent them a bunch of photos of like, this is kind of what we want, and with the wedding planner they had a spreadsheet that they initially started with rough costs of all the elements. And then it was a lot of collaboration, back and forth — I want full length tablecloth to the ground, gray, full overhead covered in greenery and florals. And then she would find suppliers that could deliver those things."},
      {time:"42:09",text:"When it came down to chairs, I never thought I\'d be choosing a chair. But sure enough we\'re rocking up to a furniture hire store choosing a chair. It was pretty cool, actually. Totally just sending inspiration images from Pinterest or whatever I\'d seen on Instagram."},
      {time:"42:55",text:"The hardest part when it comes down to completely costing the wedding — the conversion rates and things like that, when you\'re dealing with multiple suppliers. You\'re like, oh my God, have we actually calculated this correctly, how much have we spent?"},
      {time:"43:44",text:"People still talk about it — so it\'s high praise. Even now, people that came to our wedding, they\'ve got new partners, they go \'Oh, I\'ve heard about your wedding, I wish I was there.\' Everyone had a holiday. We gave a lot of people more than a year\'s notice because we never wanted to put pressure or stress."},
      {time:"44:43",text:"For us it was just yeah, creating that experience. We didn\'t really care about the not seeing you the night before the wedding, the vows, the cake, the dance. It was more just experience. And my husband and I, we loved creating that together. You often hear about, I\'m sick of this wedding, I can\'t wait for it to be over, and she\'s done it all. There was nothing we didn\'t do together."},
      {time:"45:09",text:"It was enjoyable to do together. It wasn\'t like it was all lumped on me. He got to be a part of it and it was fun. So I think that would be the key thing — it was enjoyable to do together."},
    ]
  }
];

const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function hlText(text, areaId) {
  if (!areaId) return esc(text);
  const area = AREAS.find(a => a.id === areaId);
  if (!area) return esc(text);
  let out = esc(text);
  area.keywords.forEach(kw => {
    const re = new RegExp(`\\b(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})\\b`, 'gi');
    out = out.replace(re, `<mark class="hl" style="background:${area.bg};color:${area.color};">$1</mark>`);
  });
  return out;
}

const getArea = id => AREAS.find(a => a.id === id);
const getP = id => PARTICIPANTS.find(p => p.id === id);

function fmtDate() {
  return new Date().toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});
}

function renderSidebar() {

  });
  h += '<div class="nav-label" style="margin-top:6px;">Areas of Investigation</div>';
  AREAS.forEach(area => {

  });
  nav.innerHTML = h;
}

function renderTopbar() {
  const title = document.getElementById('topbar-title');
  document.getElementById('topbar-date').textContent = fmtDate();
  document.getElementById('topbar-pill').textContent = PARTICIPANTS.length + ' Participant' + (PARTICIPANTS.length !== 1 ? 's' : '');
  if (S.view === 'dashboard') title.innerHTML = 'Dashboard';
  else if (S.view === 'participants') title.innerHTML = 'Participants';
  else if (S.view === 'participant-detail') {
    const p = getP(S.participantId);
    title.innerHTML = `<span class="crumb" onclick="go('participants')">Participants</span> &nbsp;/&nbsp; ${p?.name || ''}`;
  } else if (S.view === 'synthesis') title.innerHTML = 'Synthesis';
  else if (S.view === 'area') {
    const a = getArea(S.areaId);
    title.innerHTML = `<span class="crumb" onclick="go('synthesis')">Synthesis</span> &nbsp;/&nbsp; ${a?.label || ''}`;
  }
}

function renderDashboard() {
  const totalQ = PARTICIPANTS.reduce((n,p) => n + Object.values(p.quotes).reduce((m,qs) => m+qs.length, 0), 0);
  let h = `<div class="fade-up">`;
  // Stats
  h += `<div class="stat-grid stagger">
    <div class="stat-card"><div class="stat-label">Participants</div><div class="stat-value">${PARTICIPANTS.length}</div><div class="stat-sub">Interview sessions complete</div></div>
    <div class="stat-card"><div class="stat-label">Areas of Investigation</div><div class="stat-value">${AREAS.length}</div><div class="stat-sub">Thematic lenses active</div></div>
    <div class="stat-card"><div class="stat-label">Tagged Quotes</div><div class="stat-value">${totalQ}</div><div class="stat-sub">Across all participants</div></div>
  </div>`;
  // Pattern cards
  h += `<div class="section-header"><div class="section-title">Emerging Patterns</div><div class="section-count">by area of investigation</div></div>`;
  h += `<div class="patterns-grid stagger">`;
  AREAS.forEach(area => {
    const pCount = PARTICIPANTS.filter(p => p.quotes[area.id]?.length > 0).length;
    h += `<div class="pattern-card" onclick="goArea('${area.id}')">
      <div class="pattern-card-top">
        <span class="area-tag" style="background:${area.bg};color:${area.color};border-color:${area.border};">
          <span style="width:5px;height:5px;border-radius:50%;background:${area.color};display:inline-block;"></span>
          ${area.label}
        </span>
        <span class="tag-count">${pCount}/${PARTICIPANTS.length} participant${pCount!==1?'s':''}</span>
      </div>
      <ul class="pattern-insights">${area.insights.slice(0,2).map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`;
  });
  h += `</div>`;
  // Featured quotes
  const featured = [
    {pid:'P01',area:'meaning',qi:0},
    {pid:'P02',area:'meaning',qi:0},
    {pid:'P01',area:'size',qi:0},
    {pid:'P02',area:'vendor',qi:2},
    {pid:'P01',area:'family',qi:1},
    {pid:'P02',area:'family',qi:0},
  ];
  h += `<div class="section-header" style="margin-top:28px;"><div class="section-title">Featured Quotes</div><div class="section-count">selected highlights</div></div>`;
  h += `<div class="quotes-grid stagger">`;
  featured.forEach(f => {
    const p = getP(f.pid); const area = getArea(f.area);
    const q = p?.quotes[f.area]?.[f.qi];
    if (!q) return;
    h += `<div class="quote-card" style="border-left-color:${area.color};">
      <div class="quote-bigmark">&ldquo;</div>
      <div class="quote-text">&ldquo;${esc(q.text)}&rdquo;</div>
      <div class="quote-meta">
        <span class="area-tag" style="background:${area.bg};color:${area.color};border:1px solid ${area.border};font-size:9.5px;padding:2px 7px;">${area.label}</span>
        <span class="quote-author">${p.name}</span>
        <span>(${p.id}) · ${q.timestamp}</span>
      </div>
    </div>`;
  });
  h += `</div></div>`;
  return h;
}

  }
  h += `</div>`;
  return h;
}

function renderTranscript(p) {
  const activeArea = S.hlArea ? getArea(S.hlArea) : null;
  let h = `<div class="transcript-box">
    <div class="transcript-toolbar">
      <span class="lbl">Highlight:</span>
      <div class="filter-chips">
        <span class="fchip" style="background:${S.hlArea===null?'#1a1d2b':'rgba(0,0,0,0.04)'};color:${S.hlArea===null?'white':'var(--text-muted)'};border-color:${S.hlArea===null?'#1a1d2b':'var(--border)'};" onclick="setHL(null)">None</span>
        ${AREAS.map(a=>`<span class="fchip" style="background:${S.hlArea===a.id?a.color:a.bg};color:${S.hlArea===a.id?'white':a.color};border-color:${a.border};" onclick="setHL('${a.id}')">${a.label.split(' ')[0]}</span>`).join('')}
      </div>
    </div>
    <div class="transcript-scroll">`;
  p.transcript.forEach(e => {
    h += `<div class="t-entry"><span class="t-time">${e.time}</span><span class="t-text">${hlText(e.text, S.hlArea)}</span></div>`;
  });
  h += `</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
// SYNTHESIS
// ═══════════════════════════════════════════════════════════

function renderSynthesis() {
  let h = `<div class="fade-up">
    <div class="section-header"><div class="section-title">Research Synthesis</div></div>
    <p class="synth-intro">Human-centred synthesis across <strong>${PARTICIPANTS.length}</strong> interview session${PARTICIPANTS.length!==1?'s':''} to date, organised by area of investigation. Observations are framed to capture who, what, why, how, and why it matters. Each area also surfaces tensions and gaps in the current evidence, and opportunity areas anchored to named human needs. Click any area to explore in depth.</p>`;
  AREAS.forEach(area => {
    const allQ = PARTICIPANTS.flatMap(p => (p.quotes[area.id]||[]).map(q=>({...q,p})));
    const pCount = PARTICIPANTS.filter(p => p.quotes[area.id]?.length > 0).length;
    h += `<div class="synth-area">
      <div class="synth-area-head" onclick="goArea('${area.id}')">
        <span class="nav-dot" style="background:${area.color};width:11px;height:11px;"></span>
        <span class="synth-area-title">${area.label}</span>
        <span class="synth-area-meta">${allQ.length} quotes · ${pCount} participant${pCount!==1?'s':''}</span>
        <span style="color:var(--text-muted);font-size:13px;">→</span>
      </div>
      <div class="synth-area-body">
        <p class="synth-narrative">${area.narrative}</p>
        <div class="synth-insights-lbl">Observations</div>
        <div class="synth-insights">${area.insights.map(i=>`<div class="synth-insight-item" style="border-left-color:${area.color};background:${area.bg};">${i}</div>`).join('')}</div>
        ${(area.tensions||[]).length>0?`<div class="synth-section-lbl">Tensions &amp; Gaps</div><div class="synth-tensions">${area.tensions.map(t=>`<div class="synth-tension-item">${t}</div>`).join('')}</div>`:''}
        ${(area.opportunities||[]).length>0?`<div class="synth-section-lbl">Opportunity Areas</div><div class="synth-opps">${area.opportunities.map(o=>`<div class="synth-opp-item" style="border-left-color:${area.color};background:${area.bg};"><div><div class="opp-need" style="color:${area.color};">Human need: ${o.need}</div>${o.opportunity}</div></div>`).join('')}</div>`:''}
        ${allQ.length>0?`<div class="synth-insights-lbl">Supporting Quotes</div><div class="synth-quotes">${allQ.slice(0,2).map(q=>`<div class="iquote" style="border-left-color:${area.color};background:${area.bg};">&ldquo;${esc(q.text)}&rdquo;<div class="iquote-credit">${q.p.name} (${q.p.id}) · ${q.timestamp}</div></div>`).join('')}</div>`:''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
// AREA DETAIL
// ═══════════════════════════════════════════════════════════

function renderAreaDetail() {
  const area = getArea(S.areaId);
  if (!area) return '';
  const allQ = PARTICIPANTS.flatMap(p => (p.quotes[area.id]||[]).map(q=>({...q,p})));
  let h = `<div class="fade-up">
    <div class="area-hero" style="background:${area.bg};border-color:${area.border};border-left-color:${area.color};">
      <div class="area-hero-name"><span class="nav-dot" style="background:${area.color};width:13px;height:13px;"></span>${area.label}</div>
      <p class="area-hero-narrative">${area.narrative}</p>
    </div>
    <div class="section-header"><div class="section-title">Observations</div></div>
    <div class="insights-2col stagger">`;
  area.insights.forEach((ins,i) => {
    h += `<div class="insight-item-num">
      <span class="num-badge" style="background:${area.bg};color:${area.color};border-color:${area.border};">${i+1}</span>
      <span style="font-size:12.5px;color:var(--text-secondary);line-height:1.6;">${ins}</span>
    </div>`;
  });
  h += `</div>`;
  if ((area.tensions||[]).length > 0) {
    h += `<div class="section-header"><div class="section-title">Tensions &amp; Gaps</div></div>`;
    h += `<div class="synth-tensions" style="margin-bottom:24px;">`;
    area.tensions.forEach(t => {
      h += `<div class="synth-tension-item">${t}</div>`;
    });
    h += `</div>`;
  }
  if ((area.opportunities||[]).length > 0) {
    h += `<div class="section-header"><div class="section-title">Opportunity Areas</div></div>`;
    h += `<div class="synth-opps" style="margin-bottom:24px;">`;
    area.opportunities.forEach((o,i) => {
      h += `<div class="synth-opp-item" style="border-left-color:${area.color};background:${area.bg};flex-direction:column;gap:4px;">
        <div class="opp-need" style="color:${area.color};">Human need: ${o.need}</div>
        <div style="font-size:12.5px;line-height:1.65;">${o.opportunity}</div>
      </div>`;
    });
    h += `</div>`;
  }
  h += `<div class="section-header"><div class="section-title">All Quotes</div><div class="section-count">${allQ.length} tagged</div></div>`;
  h += `<div class="all-quotes">`;
  allQ.forEach(q => {
    h += `<div class="full-quote" style="border-left-color:${area.color};">
      <div class="full-quote-text">&ldquo;${esc(q.text)}&rdquo;</div>
      <div class="full-quote-meta">
        <span class="mini-avatar" style="background:${q.p.gradient}">${q.p.initials}</span>
        <span style="font-weight:600;font-size:12.5px;">${q.p.name}</span>
        <span style="font-size:11px;color:var(--text-muted);">(${q.p.id}) · ${q.timestamp}</span>
        <span class="goto-link" onclick="goParticipant('${q.p.id}')">View profile →</span>
      </div>
    </div>`;
  });
  h += `</div>`;
  h += `<div class="section-header"><div class="section-title">Participant Breakdown</div></div>`;
  h += `<div class="p-breakdown">`;
  PARTICIPANTS.forEach(p => {
    const pQ = p.quotes[area.id] || [];
    const pI = p.insights[area.id] || [];
    h += `<div class="p-breakdown-item">
      <div class="p-breakdown-head">
        <span class="mini-avatar" style="background:${p.gradient}">${p.initials}</span>
        <span class="p-breakdown-name">${p.name}</span>
        <span class="p-breakdown-id">${p.id}</span>
        <span class="p-breakdown-count">${pQ.length} quote${pQ.length!==1?'s':''}</span>
      </div>
      ${pI.map(i=>`<div class="p-breakdown-insight" style="border-left-color:${area.border};">${i}</div>`).join('')}
    </div>`;
  });
  h += `</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function go(view) {
  S.view = view; S.participantId = null; S.areaId = null;
  S.profileTab = 'overview'; S.hlArea = null;
  render();
}

function goParticipant(id) {
  S.view = 'participant-detail'; S.participantId = id;
  S.areaId = null; S.profileTab = 'overview'; S.hlArea = null;
  render();
}

function goArea(id) {
  S.view = 'area'; S.areaId = id; S.participantId = null;
  render();
}

function setTab(tab) {
  S.profileTab = tab;
  if (tab !== 'transcript') S.hlArea = null;
  render();
}

function setHL(areaId) {
  S.hlArea = areaId;
  render();
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

function render() {
  renderSidebar();
  renderTopbar();
  const c = document.getElementById('content');
  if (S.view === 'dashboard') c.innerHTML = renderDashboard();
  else if (S.view === 'participants') c.innerHTML = renderParticipants();
  else if (S.view === 'participant-detail') c.innerHTML = renderParticipantDetail();
  else if (S.view === 'synthesis') c.innerHTML = renderSynthesis();
  else if (S.view === 'area') c.innerHTML = renderAreaDetail();
  c.scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

document.getElementById('stat-date').textContent = fmtDate();
document.getElementById('stat-p').textContent = PARTICIPANTS.length;
document.getElementById('topbar-date').textContent = fmtDate();
render();
</script>
</body>
</html>
